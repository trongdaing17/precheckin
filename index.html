const FacePlaceholder = ({ size = 36, name = "", state = "default" }) => {
  // Generate stable color from name
  const palette = [
  ["#E6F0F7", "#0F5A8A"],
  ["#FBEFE0", "#B6601B"],
  ["#E2F2EE", "#0E7C66"],
  ["#FBE8E5", "#B0372F"],
  ["#EEEAF7", "#5A3D9E"],
  ["#F2EAE0", "#7A5530"]];

  let h = 0;
  for (let i = 0; i < name.length; i++) h = h * 31 + name.charCodeAt(i) | 0;
  const [bg, fg] = palette[Math.abs(h) % palette.length];
  const initials = name.split(/\s+/).filter(Boolean).slice(-2).map((s) => s[0]).join("").toUpperCase() || "?";

  if (state === "missing") {

        <Icon name="image" size={size * 0.5} />

  return (
    <div style={{

      display: "grid", placeItems: "center", fontSize: size * 0.36, fontWeight: 600,

      `radial-gradient(ellipse at 50% 38%, ${fg}22 0 ${size * 0.18}px, transparent ${size * 0.2}px),` +
      `radial-gradient(ellipse at 50% 78%, ${fg}33 0 ${size * 0.32}px, transparent ${size * 0.34}px)`

        color: fg, opacity: 0.55, letterSpacing: 0.3
      }}>{initials}</span>
    </div>);

};

    matched: files.filter((f) => f.status === "matched").length,
    ambiguous: files.filter((f) => f.status === "ambiguous").length,
    unmapped: files.filter((f) => f.status === "unmapped").length,
    skipped: files.filter((f) => f.status === "skipped").length,
    total: files.length
  };
  const ready = counts.matched; // ready-to-register count

  const visible = files.filter((f) => {
    if (tab === "all") return f.status !== "skipped";
    return f.status === tab;
  });

  const usedProfileIds = new Set(
    files.filter((f) => typeof f.match === "string").map((f) => f.match)
  );

  const profileById = (id) => data.profiles.find((p) => p.id === id);
  const profileLabel = (id) => {
    const p = profileById(id);
    return p ? `${p.name} · Room ${p.room} · ${p.id}` : "—";
  };

  const setMatch = (file, profileId) => {
    setFiles((fs) => fs.map((f) => f.file === file ? { ...f, match: profileId, status: "matched" } : f));
    setOpenDropdown(null);
  };
  const setSkip = (file) => {
    setFiles((fs) => fs.map((f) => f.file === file ? { ...f, status: "skipped" } : f));
  };
  const unskip = (file) => {
    setFiles((fs) => fs.map((f) => f.file === file ? { ...f, status: f.match ? "matched" : "unmapped" } : f));
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", background: PMS.bg, fontFamily: 'Inter, -apple-system, "Segoe UI", sans-serif', color: PMS.ink }}>

          }}>

              <strong style={{ color: PMS.ink }}>{ready}</strong> photo{ready === 1 ? "" : "s"} ready to register ·{" "}
              <span style={{ color: counts.ambiguous + counts.unmapped > 0 ? PMS.warn : PMS.inkMuted }}>
                {counts.ambiguous + counts.unmapped} still need attention
              </span>
              {counts.skipped > 0 && <> · {counts.skipped} will be skipped</>}
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              <Btn
                variant="primary"
                icon="scan"
                disabled={ready === 0}
                onClick={() => window.GO && window.GO(4)}>
                
                Confirm & Register {ready} photo{ready === 1 ? "" : "s"}
              </Btn>
            </div>
          </div>

          <div style={{ marginTop: 10, fontSize: 11, color: PMS.inkSubtle, lineHeight: 1.7 }}>
            <Icon name="lock" size={11} /> All actions are logged with user, timestamp, and IP for audit (NĐ 13/2023/NĐ-CP — Điều 26).
          </div>

          {/* In-page modals */}
          {modal &&
          <div onClick={() => setModal(null)} style={{
            position: "absolute", inset: 0, background: "rgba(17,32,46,0.42)",

          }}>
              <div onClick={(e) => e.stopPropagation()} style={{

              }
              </div>
            </div>
          }
        </div>

}

// Profile picker dropdown (works for both ambiguous and unmapped)
function ProfileDropdown({ isOpen, setOpen, profiles, candidates, onPick, placeholder, tone }) {
  const [q, setQ] = React.useState("");
  const ref = React.useRef(null);

  React.useEffect(() => {
    if (!isOpen) return;
    const close = (e) => {if (ref.current && !ref.current.contains(e.target)) setOpen();};
    document.addEventListener("mousedown", close);
    return () => document.removeEventListener("mousedown", close);
  }, [isOpen]);

  const list = candidates ?
  profiles.filter((p) => candidates.includes(p.id)) :
  profiles.filter((p) => !q || p.name.toLowerCase().includes(q.toLowerCase()) || p.id.toLowerCase().includes(q.toLowerCase()));

  return (
    <div ref={ref} style={{ position: "relative", display: "inline-block", minWidth: 280 }}>
      <div onClick={setOpen} style={{
        display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8,
        padding: "5px 10px", border: `1px solid ${tone === "warn" ? "#EBC79A" : "#E5BFB8"}`,
        background: tone === "warn" ? PMS.warnSoft : PMS.dangerSoft,
        borderRadius: 4, fontSize: 12, color: PMS.ink, cursor: "pointer"
      }}>
        <span style={{ color: PMS.inkMuted }}>{placeholder}</span>
        <Icon name="chevronDown" size={12} />
      </div>
      {isOpen &&
      <div style={{
        position: "absolute", top: "calc(100% + 4px)", left: 0, zIndex: 20,
        width: 360, background: PMS.surface, border: `1px solid ${PMS.borderStrong}`, borderRadius: 6,
        boxShadow: "0 10px 28px rgba(17,32,46,0.14)", overflow: "hidden"
      }}>
          {!candidates &&
        <div style={{ padding: 8, borderBottom: `1px solid ${PMS.border}`, display: "flex", alignItems: "center", gap: 6 }}>
              <Icon name="search" size={13} stroke={PMS.inkSubtle} />
              <input
            autoFocus
            value={q}
            onChange={(e) => setQ(e.target.value)}
            placeholder="Search profile by name or ID…"
            style={{ flex: 1, border: "none", outline: "none", fontSize: 12, color: PMS.ink, background: "transparent" }} />
            </div>
        }
          <div style={{ maxHeight: 240, overflow: "auto" }}>
            {list.length === 0 &&
          <div style={{ padding: "16px 12px", fontSize: 12, color: PMS.inkSubtle, textAlign: "center" }}>
                All profiles already mapped to other files.
              </div>
          }
            {list.map((p) =>
          <div key={p.id} onClick={() => onPick(p.id)} style={{
            padding: "8px 12px", fontSize: 12, cursor: "pointer", borderBottom: `1px solid ${PMS.border}`,
            display: "flex", alignItems: "center", gap: 10
          }}
          onMouseDown={(e) => e.preventDefault()}
          onMouseEnter={(e) => e.currentTarget.style.background = PMS.surfaceMuted}
          onMouseLeave={(e) => e.currentTarget.style.background = "transparent"}>
            
                <FacePlaceholder size={28} name={p.name} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 500, color: PMS.ink }}>{p.name}</div>
                  <div style={{ fontSize: 11, color: PMS.inkMuted, fontFamily: "ui-monospace, Menlo, monospace" }}>
                    {p.id} · Room {p.room}
                  </div>
                </div>
                <Icon name="check" size={14} stroke={PMS.brand} />
              </div>
          )}
          </div>
          {candidates &&
        <div style={{ padding: "8px 12px", fontSize: 11, background: PMS.warnSoft, color: PMS.warn, borderTop: `1px solid ${PMS.border}` }}>
              <Icon name="warn" size={11} /> 2 profiles share this name — pick the correct one.
            </div>
        }
        </div>
      }
    </div>);

}

window.ScreenReview = ScreenReview;

  { file: "nguyen huu phuoc.jpg", profile: "Nguyễn Hữu Phước", result: "ok", bioId: "BIO-7C4A9E" },
  { file: "phan thi my duyen.jpg", profile: "Phan Thị Mỹ Duyên", result: "ok", bioId: "BIO-7C4A9F" },
  { file: "ho van quy.jpg", profile: "Hồ Văn Quý", result: "fail", error: "LOW_QUALITY" },
  { file: "lam thanh tung.jpg", profile: "Lâm Thanh Tùng", result: "fail", error: "MULTIPLE_FACES" },
  { file: "1758 Nguyen Khanh.jpg", profile: "Nguyễn Khánh (manual)", result: "ok", bioId: "BIO-7C4AA0" }],
  []);

  const [idx, setIdx] = React.useState(0);
  const [statuses, setStatuses] = React.useState(() => queue.map(() => "pending")); // pending | processing | ok | fail
  const [done, setDone] = React.useState(false);

  const CONCURRENCY = 5;

  React.useEffect(() => {
    if (done) return;
    if (idx >= queue.length) {setDone(true);return;}

    // mark next slot as processing
    setStatuses((s) => {
      const ns = [...s];
      ns[idx] = "processing";
      return ns;
    });
    const t = setTimeout(() => {
      setStatuses((s) => {
        const ns = [...s];
        ns[idx] = queue[idx].result;
        return ns;
      });
      setIdx((i) => i + 1);
    }, 380 + Math.random() * 220);
    return () => clearTimeout(t);
  }, [idx, done]);

  const counts = {
    done: statuses.filter((s) => s === "ok").length,
    failed: statuses.filter((s) => s === "fail").length,
    processing: statuses.filter((s) => s === "processing").length,

          <Card style={{ marginTop: 12 }}

}

<script type="text/babel">
const { useState, useEffect, useRef, useLayoutEffect } = React;

const SCREENS = [
  { id: "s1", label: "01 · Itinerary",       Component: ScreenItinerary,  width: 1440, height: 900 },
  { id: "s2", label: "02 · Upload ZIP",      Component: ScreenUpload,     width: 1440, height: 900 },
  { id: "s3", label: "03 · Review mapping",  Component: ScreenReview,     width: 1440, height: 980 },
  { id: "s4", label: "04 · Processing",      Component: ScreenProcessing, width: 1440, height: 900 },
  { id: "s5", label: "05 · Summary",         Component: ScreenSummary,    width: 1440, height: 980 },
];

function App() {
  const [step, setStep] = useState(1);
  const stageRef = useRef(null);
  const frameRef = useRef(null);
  const [scale, setScale] = useState(1);

  // Expose navigation to in-screen buttons
  useEffect(() => {
    window.GO = (n) => {
      if (typeof n === "number" && n >= 1 && n <= SCREENS.length) setStep(n);
    };
  }, []);

  const current = SCREENS[step - 1];

  // Fit-to-viewport scaling: shrink the 1440-wide stage so it fits the
  // available area (and the full height of the screen). Recalculate on
  // resize and on screen change (different heights).
  useLayoutEffect(() => {
    const compute = () => {
      const frame = frameRef.current;
      if (!frame) return;
      const rect = frame.getBoundingClientRect();
      const padding = 32;
      const sx = (rect.width  - padding) / current.width;
      const sy = (rect.height - padding) / current.height;
      const next = Math.min(sx, sy, 1);
      setScale(next > 0 ? next : 1);
    };
    compute();
    window.addEventListener("resize", compute);
    return () => window.removeEventListener("resize", compute);
  }, [step]);

  // Keyboard: ← → to navigate
  useEffect(() => {
    const onKey = (e) => {
      if (e.target && (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.isContentEditable)) return;
      if (e.key === "ArrowRight") setStep((s) => Math.min(SCREENS.length, s + 1));
      if (e.key === "ArrowLeft")  setStep((s) => Math.max(1, s - 1));
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  return (
    <>
      <div className="nav-bar">
        <span className="title">Bulk Face ID Registration · Group Reservation</span>
        {SCREENS.map((s, i) => (
          <span key={s.id}
                className={"step" + (i + 1 === step ? " active" : "")}
                onClick={() => setStep(i + 1)}>
            {s.label}
          </span>
        ))}
        <span className="hint">← → để chuyển màn hình</span>
        <button className="icon" onClick={() => setStep((s) => Math.max(1, s - 1))} disabled={step === 1} title="Previous">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18 9 12l6-6"/></svg>
        </button>
        <button className="icon" onClick={() => setStep((s) => Math.min(SCREENS.length, s + 1))} disabled={step === SCREENS.length} title="Next">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </div>
      <div className="app-frame" ref={frameRef}>
        <div ref={stageRef}
             className="stage"
             style={{ width: current.width, height: current.height, transform: `scale(${scale})` }}
             key={current.id}>
          <current.Component/>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
