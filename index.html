    brand: { bg: pms.brandSoft, fg: pms.brand, dot: pms.brand },
    ok: { bg: pms.okSoft, fg: pms.ok, dot: pms.ok },
    warn: { bg: pms.warnSoft, fg: pms.warn, dot: pms.warn },
    danger: { bg: pms.dangerSoft, fg: pms.danger, dot: pms.danger },
    accent: { bg: pms.accentSoft, fg: pms.accent, dot: pms.accent },
  }[tone];
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 5, padding: "2px 8px", background: m.bg, color: m.fg, borderRadius: 999, fontSize: 11, fontWeight: 600, lineHeight: 1.5, whiteSpace: "nowrap" }}>
      {dot && <span style={{ width: 6, height: 6, borderRadius: "50%", background: m.dot }}/>}
      {children}
    </span>
  );
};

const Btn = ({ variant = "default", icon, children, onClick, disabled, size = "md", style = {} }) => {
  const v = {
    primary: { bg: pms.brand, fg: "#fff", border: pms.brand },
    default: { bg: pms.surface, fg: pms.ink, border: pms.borderStrong },
    ghost: { bg: "transparent", fg: pms.inkMuted, border: "transparent" },
    danger: { bg: pms.surface, fg: pms.danger, border: pms.borderStrong },
    success: { bg: pms.accent, fg: "#fff", border: pms.accent },
  }[variant];
  const pad = size === "sm" ? "4px 10px" : size === "lg" ? "9px 18px" : "6px 14px";
  const fs = size === "sm" ? 12 : size === "lg" ? 14 : 13;
  return (
    <button onClick={onClick} disabled={disabled} style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: pad, fontSize: fs, fontWeight: 500, borderRadius: 5, background: v.bg, color: v.fg, border: `1px solid ${v.border}`, cursor: disabled ? "not-allowed" : "pointer", opacity: disabled ? 0.5 : 1, fontFamily: "inherit", ...style }}>
      {icon && <Icon name={icon} size={fs}/>}
      {children}
    </button>
  );
};

const FacePlaceholder = ({ size = 36, name = "", state = "default" }) => {
  const palette = [["#E6F0F7","#0F5A8A"],["#FBEFE0","#B6601B"],["#E2F2EE","#0E7C66"],["#FBE8E5","#B0372F"],["#EEEAF7","#5A3D9E"],["#F2EAE0","#7A5530"]];
  let h = 0;
  for (let i = 0; i < name.length; i++) h = h * 31 + name.charCodeAt(i) | 0;
  const [bg, fg] = palette[Math.abs(h) % palette.length];
  const initials = name.split(/\s+/).filter(Boolean).slice(-2).map(s => s[0]).join("").toUpperCase() || "?";
  if (state === "missing" || state === "empty") {
    return (
      <div style={{ width: size, height: size, borderRadius: 4, background: "#F4F6F8", border: `1px dashed ${pms.borderStrong}`, display: "grid", placeItems: "center", color: pms.inkSubtle, flexShrink: 0 }}>
        <Icon name="image" size={size * 0.5}/>
      </div>
    );
  }
  return (
    <div style={{ width: size, height: size, borderRadius: 4, background: bg, color: fg, display: "grid", placeItems: "center", fontSize: size * 0.36, fontWeight: 600, flexShrink: 0, position: "relative", overflow: "hidden",
      backgroundImage: `radial-gradient(ellipse at 50% 38%, ${fg}22 0 ${size * 0.18}px, transparent ${size * 0.2}px), radial-gradient(ellipse at 50% 78%, ${fg}33 0 ${size * 0.32}px, transparent ${size * 0.34}px)` }}>
      <span style={{ position: "absolute", bottom: 1, right: 2, fontSize: size * 0.22, fontWeight: 700, color: fg, opacity: 0.55 }}>{initials}</span>
    </div>
  );
};

// ===== Dropdown menu for row actions =====
function DropdownMenu({ children, items, align = "right" }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!open) return;
    const close = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", close);
    return () => document.removeEventListener("mousedown", close);
  }, [open]);
  return (
    <div ref={ref} style={{ position: "relative", display: "inline-block" }}>
      <div onClick={(e) => { e.stopPropagation(); setOpen(o => !o); }} style={{ cursor: "pointer", display: "inline-flex" }}>
        {children}
      </div>
      {open && (
        <div style={{ position: "absolute", top: "calc(100% + 4px)", [align]: 0, zIndex: 40, minWidth: 200, background: pms.surface, border: `1px solid ${pms.borderStrong}`, borderRadius: 6, boxShadow: "0 10px 28px rgba(17,32,46,0.18)", overflow: "hidden", padding: 4 }}>
          {items.map((item, i) => (
            item.divider ? <div key={i} style={{ height: 1, background: pms.border, margin: "4px 0" }}/> :
            item.header ? <div key={i} style={{ fontSize: 10, color: pms.inkSubtle, textTransform: "uppercase", letterSpacing: 0.6, padding: "6px 10px 2px" }}>{item.header}</div> :
            <div key={i} onClick={() => { setOpen(false); item.onClick && item.onClick(); }}
              style={{ padding: "7px 10px", fontSize: 12, color: item.danger ? pms.danger : pms.ink, cursor: "pointer", borderRadius: 4, display: "flex", alignItems: "center", gap: 8 }}
              onMouseEnter={(e) => e.currentTarget.style.background = pms.surfaceMuted}
              onMouseLeave={(e) => e.currentTarget.style.background = "transparent"}>
              {item.icon && <Icon name={item.icon} size={13} stroke={item.danger ? pms.danger : pms.inkMuted}/>}
              <span style={{ flex: 1 }}>{item.label}</span>
              {item.hint && <span style={{ fontSize: 10, color: pms.inkSubtle }}>{item.hint}</span>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ===== Toast =====
function Toast({ message, tone = "ok", onClose }) {
  React.useEffect(() => {
    if (!message) return;
    const t = setTimeout(onClose, 2400);
    return () => clearTimeout(t);
  }, [message, onClose]);
  if (!message) return null;
  const bg = tone === "ok" ? pms.ok : tone === "warn" ? pms.warn : tone === "danger" ? pms.danger : pms.brand;
  return (
    <div style={{ position: "absolute", bottom: 24, left: "50%", transform: "translateX(-50%)", zIndex: 100, background: bg, color: "#fff", borderRadius: 6, padding: "10px 16px", fontSize: 13, fontWeight: 500, boxShadow: "0 10px 28px rgba(17,32,46,0.24)", animation: "toastIn 0.2s ease-out" }}>
      {message}
    </div>
  );
}

window.PMS = PMS; window.Icon = Icon; window.TopBar = TopBar; window.SideNav = SideNav;
window.StatusPill = StatusPill; window.Btn = Btn; window.FacePlaceholder = FacePlaceholder;
window.DropdownMenu = DropdownMenu; window.Toast = Toast;
</script>

<script type="text/babel">
// ===== Stats banner =====
function StatsBanner({ stats }) {
  return (
    <div style={{ background: PMS.surface, border: `1px solid ${PMS.border}`, borderRadius: 6, display: "grid", gridTemplateColumns: `repeat(${stats.length}, 1fr)`, overflow: "hidden" }}>
      {stats.map((s, i) => {
        const color = s.tone === "ok" ? PMS.ok : s.tone === "warn" ? PMS.warn : s.tone === "danger" ? PMS.danger : s.tone === "brand" ? PMS.brand : PMS.ink;
        return (
          <div key={i} style={{ padding: "12px 14px", borderRight: i < stats.length - 1 ? `1px solid ${PMS.border}` : "none", display: "flex", flexDirection: "column", gap: 4 }}>
            <div style={{ fontSize: 11, color: PMS.inkMuted, textTransform: "uppercase", letterSpacing: 0.4 }}>{s.label}</div>
            <div style={{ fontSize: 22, fontWeight: 700, color }}>{s.value}</div>
          </div>
        );
      })}
    </div>
  );
}

// ===== Registration Status cell =====
// regStatus: "unregistered" | "photo-uploaded" | "registered" | "failed"
// In Reviewing mode, also pass reviewState ("matched" | "ambiguous" | "no-photo") to show batch sub-status
function RegistrationStatusCell({ mode, regStatus, reviewState, bioId, error, skipped }) {
  if (skipped) {
    return <StatusPill tone="neutral" dot={false}>⊝ Skipped</StatusPill>;
  }

  const persistent = (() => {
    if (regStatus === "registered") return <StatusPill tone="ok"><Icon name="check" size={10}/> Registered</StatusPill>;
    if (regStatus === "photo-uploaded") return <StatusPill tone="brand">📷 Photo Uploaded</StatusPill>;
    if (regStatus === "failed") return <StatusPill tone="danger">✗ Registration Failed</StatusPill>;
    return <StatusPill tone="warn" dot={false}>◯ Unregistered</StatusPill>;
  })();

  // In Reviewing mode, show batch sub-status under the persistent pill
  if (mode === "reviewing") {
    let batchPill = null;
    if (reviewState === "matched") batchPill = <span style={{ fontSize: 10, color: PMS.ok }}>📷 Photo uploaded (batch)</span>;
    else if (reviewState === "ambiguous") batchPill = <span style={{ fontSize: 10, color: PMS.warn }}>⚠ Needs review (batch)</span>;
    else batchPill = <span style={{ fontSize: 10, color: PMS.inkSubtle }}>◯ No photo (batch)</span>;
    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
        {persistent}
        <div style={{ paddingLeft: 2 }}>{batchPill}</div>
      </div>
    );
  }

  // In Resolved mode with registered/failed, show bioId/error as sub-line
  if (mode === "resolved" || mode === "default") {
    if (regStatus === "registered" && bioId) {
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
          {persistent}
          <div style={{ fontSize: 10, color: PMS.inkSubtle, fontFamily: "ui-monospace, Menlo, monospace", paddingLeft: 2 }}>{bioId}</div>
        </div>
      );
    }
    if (regStatus === "failed" && error) {
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
          {persistent}
          <div style={{ fontSize: 10, color: PMS.danger, paddingLeft: 2 }}>{error}</div>
        </div>
      );
    }
  }

  return persistent;
}

window.StatsBanner = StatsBanner;
window.RegistrationStatusCell = RegistrationStatusCell;
</script>

<script type="text/babel">
// ===== Guest Row — single shared component =====
function GuestRow({ guest, mode, file, reviewState, regStatus, bioId, error, skipped, onAction }) {
  const photoCell = (() => {
    if (skipped) return <FacePlaceholder size={36} name="?" state="missing"/>;
    if (regStatus === "failed" && file) {
      return (
        <div style={{ position: "relative" }}>
          <FacePlaceholder size={36} name={file.file.replace(/\.[a-z]+$/i, "")}/>
          <div style={{ position: "absolute", inset: 0, background: "rgba(176,55,47,0.18)", borderRadius: 4, display: "grid", placeItems: "center", color: PMS.danger }}>
            <Icon name="warn" size={16}/>
          </div>
        </div>
      );
    }
    if (file) return <FacePlaceholder size={36} name={file.file.replace(/\.[a-z]+$/i, "")}/>;
    return <FacePlaceholder size={36} name="?" state="missing"/>;
  })();

  // ----- Action menu items per (mode, state) -----
  const menuItems = (() => {
    if (skipped) {
      return [
        { label: "Restore (un-skip)", icon: "refresh", onClick: () => onAction && onAction("unskip", guest) },
      ];
    }
    if (mode === "default") {
      return [
        { header: "Actions" },
        { label: "Upload photo for this guest", icon: "upload", onClick: () => onAction && onAction("uploadSingle", guest) },
        { label: "View guest profile", icon: "user", onClick: () => onAction && onAction("viewProfile", guest) },
      ];
    }
    if (mode === "reviewing") {
      if (reviewState === "matched") {
        return [
          { header: "Photo actions" },
          { label: "Re-map photo…", icon: "edit", onClick: () => onAction && onAction("remap", guest) },
          { label: "Remove photo from batch", icon: "trash", onClick: () => onAction && onAction("removePhoto", guest) },
          { divider: true },
          { label: "Skip this guest", icon: "skip", danger: true, onClick: () => onAction && onAction("skip", guest) },
        ];
      }
      if (reviewState === "ambiguous") {
        return [
          { header: "Resolve ambiguity" },
          { label: "Pick this guest for the photo", icon: "check", onClick: () => onAction && onAction("pickAmbiguous", guest) },
          { label: "Open candidate picker…", icon: "users", onClick: () => onAction && onAction("openCandidates", guest) },
          { divider: true },
          { label: "Skip this guest", icon: "skip", danger: true, onClick: () => onAction && onAction("skip", guest) },
        ];
      }
      // no-photo
      return [
        { header: "Photo not found" },
        { label: "Gán ảnh từ pool…", icon: "image", onClick: () => onAction && onAction("assignFromPool", guest) },
        { label: "Upload new photo for this guest", icon: "upload", onClick: () => onAction && onAction("uploadSingle", guest) },
        { divider: true },
        { label: "Skip this guest", icon: "skip", danger: true, onClick: () => onAction && onAction("skip", guest) },
      ];
    }
    if (mode === "resolved") {
      if (regStatus === "registered") {
        return [
          { header: "bioId actions" },
          { label: "View bioId detail", icon: "eye", onClick: () => onAction && onAction("viewBio", guest) },
          { label: "Re-register (overwrite)", icon: "refresh", onClick: () => onAction && onAction("reregister", guest) },
          { divider: true },
          { label: "Revoke bioId", icon: "trash", danger: true, onClick: () => onAction && onAction("revoke", guest) },
        ];
      }
      if (regStatus === "failed") {
        return [
          { header: "Recovery" },
          { label: "Re-try with new photo", icon: "upload", onClick: () => onAction && onAction("retry", guest) },
          { label: "Re-run with same photo", icon: "refresh", onClick: () => onAction && onAction("rerun", guest) },
          { divider: true },
          { label: "Mark as skipped", icon: "skip", danger: true, onClick: () => onAction && onAction("skip", guest) },
        ];
      }
      if (regStatus === "photo-uploaded") {
        return [
          { header: "Photo uploaded, awaiting bioId" },
          { label: "Trigger registration now", icon: "scan", onClick: () => onAction && onAction("triggerRegister", guest) },
          { label: "Replace photo", icon: "edit", onClick: () => onAction && onAction("remap", guest) },
          { divider: true },
          { label: "Skip this guest", icon: "skip", danger: true, onClick: () => onAction && onAction("skip", guest) },
        ];
      }
      return [
        { label: "Upload photo", icon: "upload", onClick: () => onAction && onAction("uploadSingle", guest) },
      ];
    }
    return [];
  })();

  return (
    <tr style={{ borderBottom: `1px solid ${PMS.border}`, opacity: skipped ? 0.55 : 1 }}>
      <td style={{ padding: "8px 12px", color: PMS.inkMuted, fontFamily: "ui-monospace, Menlo, monospace", fontSize: 11 }}>{guest.confNo}</td>
      <td style={{ padding: "8px 12px", color: PMS.ink, fontWeight: 500 }}>
        {guest.name}
        <div style={{ fontSize: 10, color: PMS.inkSubtle, fontFamily: "ui-monospace, Menlo, monospace" }}>{guest.profileId} · Room {guest.room}</div>
      </td>
      <td style={{ padding: "8px 12px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          {photoCell}
          {file && !skipped && (
            <div style={{ minWidth: 0, fontSize: 11, color: PMS.inkSubtle, fontFamily: "ui-monospace, Menlo, monospace", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", maxWidth: 160 }}>
              {file.file}
            </div>
          )}
        </div>
      </td>
      <td style={{ padding: "8px 12px" }}>
        <RegistrationStatusCell mode={mode} regStatus={regStatus} reviewState={reviewState} bioId={bioId} error={error} skipped={skipped}/>
      </td>
      <td style={{ padding: "8px 12px", textAlign: "right" }}>
        {menuItems.length > 0 && (
          <DropdownMenu items={menuItems}>
            <button style={{ background: "transparent", border: `1px solid ${PMS.border}`, borderRadius: 4, padding: "3px 5px", color: PMS.inkMuted, cursor: "pointer", display: "inline-flex" }}>
              <Icon name="more" size={14}/>
            </button>
          </DropdownMenu>
        )}
      </td>
    </tr>
  );
}
window.GuestRow = GuestRow;
</script>

<script type="text/babel">
// ===== "Cần xử lý" section — combines unmapped files + needs-review (ambiguous) =====
function AttentionSection({ unmappedFiles, ambiguousItems, guests, onAction }) {
  const [collapsed, setCollapsed] = React.useState(false);
  const total = unmappedFiles.length + ambiguousItems.length;
  if (total === 0) return null;

  const guestById = id => guests.find(g => g.profileId === id);

  return (
    <div style={{ background: PMS.surface, border: `1px solid ${PMS.warnSoft === "#FBEFE0" ? "#EBC79A" : PMS.warnSoft}`, borderRadius: 6, overflow: "hidden" }}>
      <div onClick={() => setCollapsed(c => !c)} style={{ padding: "10px 14px", background: PMS.warnSoft, display: "flex", alignItems: "center", justifyContent: "space-between", cursor: "pointer", borderBottom: collapsed ? "none" : `1px solid #EBC79A` }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <Icon name="warn" size={16} stroke={PMS.warn}/>
          <div style={{ fontSize: 13, fontWeight: 600, color: PMS.ink }}>Photos cần xử lý ({total})</div>
          <div style={{ fontSize: 11, color: PMS.inkMuted }}>
            {ambiguousItems.length > 0 && <>⚠ {ambiguousItems.length} needs review</>}
            {ambiguousItems.length > 0 && unmappedFiles.length > 0 && " · "}
            {unmappedFiles.length > 0 && <>📄 {unmappedFiles.length} unmapped files</>}
          </div>
        </div>
        <Icon name={collapsed ? "chevronRight" : "chevronDown"} size={14} stroke={PMS.inkMuted}/>
      </div>

      {!collapsed && (
        <div>
          {/* Needs review (ambiguous) — file matches ≥2 guests */}
          {ambiguousItems.map(f => {
            const candidateGuests = (f.match || []).map(guestById).filter(Boolean);
            return (
              <div key={`amb-${f.file}`} style={{ padding: "10px 14px", borderBottom: `1px solid ${PMS.border}`, display: "flex", gap: 12, alignItems: "flex-start" }}>
                <FacePlaceholder size={40} name={f.file.replace(/\.[a-z]+$/i, "")}/>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                    <div style={{ fontWeight: 500, color: PMS.ink, fontSize: 13 }}>{f.file}</div>
                    <StatusPill tone="warn">⚠ Needs review</StatusPill>
                    <span style={{ fontSize: 11, color: PMS.inkSubtle }}>{f.size}</span>
                  </div>
                  <div style={{ fontSize: 11, color: PMS.inkMuted, marginTop: 4 }}>
                    Tên file <code style={{ background: PMS.bg, padding: "0 4px", borderRadius: 2 }}>{f.normalized}</code> khớp với {candidateGuests.length} guests cùng tên — chọn đúng guest:
                  </div>
                  <div style={{ marginTop: 6, display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {candidateGuests.map(g => (
                      <Btn key={g.profileId} size="sm" icon="check" onClick={() => onAction && onAction("pickCandidate", { file: f, guest: g })}>
                        {g.name} · R{g.room}
                      </Btn>
                    ))}
                    <Btn size="sm" variant="ghost" icon="skip" onClick={() => onAction && onAction("skipFile", { file: f })}>Skip file</Btn>
                  </div>
                </div>
              </div>
            );
          })}

          {/* Unmapped files */}
          {unmappedFiles.map(f => (
            <div key={`unm-${f.file}`} style={{ padding: "10px 14px", borderBottom: `1px solid ${PMS.border}`, display: "flex", gap: 12, alignItems: "flex-start" }}>
              <FacePlaceholder size={40} name={f.file.replace(/\.[a-z]+$/i, "")}/>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                  <div style={{ fontWeight: 500, color: PMS.ink, fontSize: 13 }}>{f.file}</div>
                  <StatusPill tone="danger" dot={false}>◯ Unmapped</StatusPill>
                  <span style={{ fontSize: 11, color: PMS.inkSubtle }}>{f.size}</span>
                </div>
                <div style={{ fontSize: 11, color: PMS.inkMuted, marginTop: 4 }}>
                  Tên file <code style={{ background: PMS.bg, padding: "0 4px", borderRadius: 2 }}>{f.normalized}</code> không match guest nào trong roster.
                </div>
                <div style={{ marginTop: 6, display: "flex", gap: 6 }}>
                  <DropdownMenu align="left" items={[
                    { header: "Chọn guest để gán ảnh" },
                    ...guests.slice(0, 6).map(g => ({
                      label: `${g.name} · R${g.room} · ${g.profileId}`,
                      icon: "user",
                      onClick: () => onAction && onAction("assignFile", { file: f, guest: g }),
                    })),
                    { divider: true },
                    { label: "Tìm guest khác…", icon: "search", onClick: () => onAction && onAction("searchGuest", { file: f }) },
                  ]}>
                    <Btn size="sm" icon="user">Gán cho guest ▾</Btn>
                  </DropdownMenu>
                  <Btn size="sm" variant="ghost" icon="skip" onClick={() => onAction && onAction("skipFile", { file: f })}>Skip</Btn>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
window.AttentionSection = AttentionSection;
</script>

<script type="text/babel">
// ===== Shared content: Face ID Registration tab body =====
function FaceIdTabContent({ mode, onAction, batchVersion, externalSkipped }) {
  const data = window.PROTO_DATA;
  const [search, setSearch] = React.useState("");
  const [localSkipped, setLocalSkipped] = React.useState(() => new Set());

  // Toggle skip via row action
  const setSkip = (profileId, skipped) => {
    setLocalSkipped(prev => {
      const next = new Set(prev);
      if (skipped) next.add(profileId); else next.delete(profileId);
      return next;
    });
  };

  // Build per-row view
  const rows = React.useMemo(() => {
    return data.guests.map(g => {
      const matchedFile = data.pickedFiles.find(f => f.match === g.profileId && f.status === "matched");
      const ambigFile = data.pickedFiles.find(f => f.status === "ambiguous" && Array.isArray(f.match) && f.match.includes(g.profileId));
      const file = matchedFile || ambigFile || null;
      const reviewState = matchedFile ? "matched" : ambigFile ? "ambiguous" : "no-photo";

      // Persistent registration status — depends on mode
      let regStatus = "unregistered", bioId, error;
      if (mode === "resolved") {
        const o = data.outcomes[g.profileId];
        if (o) {
          regStatus = o.status; // "registered" | "failed" | "photo-uploaded"
          bioId = o.bioId; error = o.error;
        }
      }
      // In default + reviewing, regStatus stays unregistered for everyone
      return { guest: g, file, reviewState, regStatus, bioId, error };
    });
  }, [mode]);

  const visible = rows.filter(r =>
    !search ||
    r.guest.confNo.toLowerCase().includes(search.toLowerCase()) ||
    r.guest.name.toLowerCase().includes(search.toLowerCase())
  );

  const unmappedFiles = data.pickedFiles.filter(f => f.status === "unmapped");
  const ambiguousFiles = data.pickedFiles.filter(f => f.status === "ambiguous");

  // Persistent stats
  const persistentStats = {
    unregistered: rows.filter(r => r.regStatus === "unregistered").length,
    photoUploaded: rows.filter(r => r.regStatus === "photo-uploaded").length,
    registered: rows.filter(r => r.regStatus === "registered").length,
    failed: rows.filter(r => r.regStatus === "failed").length,
  };
  const reviewCounts = {
    matched: rows.filter(r => r.reviewState === "matched" && !localSkipped.has(r.guest.profileId)).length,
    ambiguous: rows.filter(r => r.reviewState === "ambiguous").length,
    noPhoto: rows.filter(r => r.reviewState === "no-photo").length,
  };
  const ready = reviewCounts.matched;

  // ===== Stats banner (5 stats: Total / Unregistered / Photo Uploaded / Registered / Failed) =====
  const banner = (
    <StatsBanner stats={[
      { label: "Total guests",     value: data.guests.length },
      { label: "Unregistered",     value: persistentStats.unregistered, tone: persistentStats.unregistered > 0 ? "warn" : "neutral" },
      { label: "Photo Uploaded",   value: persistentStats.photoUploaded, tone: persistentStats.photoUploaded > 0 ? "brand" : "neutral" },
      { label: "Registered",       value: persistentStats.registered, tone: persistentStats.registered > 0 ? "ok" : "neutral" },
      { label: "Failed",           value: persistentStats.failed, tone: persistentStats.failed > 0 ? "danger" : "neutral" },
    ]}/>
  );

  // ===== Top action area =====
  let topActions;
  if (mode === "default") {
    topActions = (
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, background: PMS.surface, border: `1px solid ${PMS.border}`, borderRadius: 6, padding: "10px 14px" }}>
        <div style={{ fontSize: 12, color: PMS.inkMuted }}>
          <strong style={{ color: PMS.ink }}>{data.guests.length}</strong> guests trong đoàn · chưa khách nào đăng ký Face ID
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          <Btn icon="plus">+ Map single guest</Btn>
          <Btn variant="primary" icon="upload" onClick={() => onAction && onAction("openUpload")}>Đăng ký Face ID hàng loạt</Btn>
        </div>
      </div>
    );
  } else if (mode === "reviewing") {
    topActions = (
      <div style={{ background: PMS.warnSoft, border: `1px solid #EBC79A`, borderRadius: 6, padding: "10px 14px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
          <div style={{ fontSize: 12, color: PMS.ink }}>
            <strong>⚠ Đang review batch #{batchVersion || 1}</strong> · 20 files → {data.guests.length} guests ·{" "}
            <span style={{ color: PMS.ok }}>✓ {reviewCounts.matched} mapped</span> ·{" "}
            <span style={{ color: PMS.warn }}>⚠ {reviewCounts.ambiguous} needs review</span> ·{" "}
            <span style={{ color: PMS.inkMuted }}>◯ {reviewCounts.noPhoto} no photo</span> ·{" "}
            <span style={{ color: PMS.danger }}>📄 {unmappedFiles.length} unmapped</span>
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            <Btn size="sm" icon="upload" onClick={() => onAction && onAction("uploadMore")}>Upload more</Btn>
            <Btn size="sm" icon="refresh" onClick={() => onAction && onAction("replace")}>Replace batch</Btn>
            <Btn size="sm" variant="danger" icon="x" onClick={() => onAction && onAction("cancel")}>Cancel</Btn>
            <Btn size="sm" variant="primary" icon="scan" disabled={ready === 0} onClick={() => onAction && onAction("confirm")}>
              Confirm {ready} & Register →
            </Btn>
          </div>
        </div>
      </div>
    );
  } else { // resolved
    topActions = (
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, background: PMS.surface, border: `1px solid ${PMS.border}`, borderRadius: 6, padding: "10px 14px" }}>
        <div style={{ fontSize: 12, color: PMS.inkMuted }}>
          <strong style={{ color: PMS.ink }}>{persistentStats.registered} / {data.guests.length}</strong> guests sẵn sàng Face ID check-in
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          <Btn icon="upload" onClick={() => onAction && onAction("openUpload")}>Upload thêm</Btn>
          {persistentStats.failed > 0 && <Btn variant="primary" icon="refresh" onClick={() => onAction && onAction("rerunFailed")}>↻ Re-run failed</Btn>}
        </div>
      </div>
    );
  }

  // Row action handler wrapper
  const handleRowAction = (action, guest) => {
    if (action === "skip") {
      setSkip(guest.profileId, true);
      onAction && onAction("rowSkipped", guest);
      return;
    }
    if (action === "unskip") {
      setSkip(guest.profileId, false);
      onAction && onAction("rowUnskipped", guest);
      return;
    }
    onAction && onAction(action, guest);
  };

  return (
    <>
      {banner}
      <div style={{ marginTop: 12 }}>{topActions}</div>

      {/* Cần xử lý — placed ABOVE the list, right under banner/actions */}
      {mode === "reviewing" && (unmappedFiles.length + ambiguousFiles.length > 0) && (
        <div style={{ marginTop: 12 }}>
          <AttentionSection
            unmappedFiles={unmappedFiles}
            ambiguousItems={ambiguousFiles}
            guests={data.guests}
            onAction={(a, payload) => onAction && onAction(a, payload)}
          />
        </div>
      )}

      {/* Search */}
      <div style={{ marginTop: 12, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, background: PMS.surface, border: `1px solid ${PMS.border}`, borderRadius: 6, padding: "8px 10px" }}>
        <div style={{ fontSize: 12, color: PMS.inkMuted }}>Hiển thị {visible.length} / {rows.length} guests</div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "5px 10px", borderRadius: 5, border: `1px solid ${PMS.border}`, fontSize: 12, color: PMS.inkSubtle, minWidth: 240 }}>
          <Icon name="search" size={13}/>
          <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Tìm theo conf. no hoặc tên…" style={{ border: "none", outline: "none", background: "transparent", fontSize: 12, color: PMS.ink, flex: 1 }}/>
        </div>
      </div>

      {/* Main list */}
      <div style={{ marginTop: 12, background: PMS.surface, border: `1px solid ${PMS.border}`, borderRadius: 6, overflow: "visible" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
          <thead>
            <tr style={{ background: PMS.surfaceMuted, color: PMS.inkMuted, fontSize: 11, textTransform: "uppercase", letterSpacing: 0.4 }}>
              {["Conf. No", "Guest", "Photo", "Registration Status", ""].map((h, i) =>
                <th key={i} style={{ textAlign: "left", padding: "9px 12px", fontWeight: 500, borderBottom: `1px solid ${PMS.border}` }}>{h}</th>)}
            </tr>
          </thead>
          <tbody>
            {visible.map(r => (
              <GuestRow
                key={r.guest.confNo}
                guest={r.guest}
                mode={mode}
                file={mode === "default" ? null : r.file}
                reviewState={mode === "reviewing" ? r.reviewState : undefined}
                regStatus={r.regStatus}
                bioId={r.bioId}
                error={r.error}
                skipped={localSkipped.has(r.guest.profileId)}
                onAction={handleRowAction}
              />
            ))}
          </tbody>
        </table>
      </div>
    </>
  );
}
window.FaceIdTabContent = FaceIdTabContent;
</script>

<script type="text/babel">
// ===== Upload Modal =====

  React.useEffect(() => {
    if (stage === "uploading") {
      const t = setInterval(() => setProgress(p => {
        const np = Math.min(100, p + 8);
        if (np >= 100) { clearInterval(t); setTimeout(() => setStage("matching"), 250); }
        return np;
      }), 100);
      return () => clearInterval(t);
    }

      const t = setTimeout(() => setStage("done"), 1000);
      return () => clearTimeout(t);

                <div style={{ display: "inline-grid", placeItems: "center", width: 52, height: 52, borderRadius: 12, background: PMS.brandSoft, color: PMS.brand, marginBottom: 10 }}>
                  <Icon name="upload" size={26}/>
                </div>
                <div style={{ fontSize: 14, fontWeight: 600, color: PMS.ink }}>Kéo thả ảnh JPG/PNG/JPEG, hoặc click để chọn</div>
                <div style={{ fontSize: 12, color: PMS.inkMuted, marginTop: 4, lineHeight: 1.6 }}>
                  Multi-select · tên file = họ tên khách (vd <code style={{ background: PMS.bg, padding: "1px 5px", borderRadius: 3 }}>nguyen thi van.jpg</code>)<br/>
                  Tối đa 200 ảnh · Mỗi ảnh ≤ 5 MB · Tổng ≤ 500 MB
                </div>
              </div>
              <div style={{ marginTop: 14, padding: 12, background: PMS.warnSoft, border: `1px solid #EBC79A`, borderRadius: 6, display: "flex", gap: 10, alignItems: "flex-start" }}>
                <div style={{ color: PMS.warn, marginTop: 1 }}><Icon name="lock" size={16}/></div>
                <label style={{ fontSize: 12, color: PMS.ink, lineHeight: 1.55, flex: 1, cursor: "pointer", display: "flex", gap: 8, alignItems: "flex-start" }}>
                  <input type="checkbox" checked={consent} onChange={(e) => setConsent(e.target.checked)} style={{ marginTop: 2 }}/>
                  <span><strong>PDPA consent.</strong> Khách đã đồng ý cho khách sạn lưu ảnh khuôn mặt phục vụ check-in. Mọi thao tác được ghi audit log. (NĐ 13/2023/NĐ-CP)</span>
                </label>
              </div>
              <div style={{ marginTop: 14, display: "flex", justifyContent: "flex-end", gap: 6 }}>

                <Btn variant="primary" icon="folder" disabled={!consent} onClick={() => setStage("uploading")}>Chọn ảnh từ máy</Btn>

              </div>

            <>

                <div>
                  <div style={{ fontSize: 14, fontWeight: 600 }}>Đã upload 20 ảnh</div>
                  <div style={{ fontSize: 12, color: PMS.inkMuted }}>16 mapped · 1 needs review · 3 unmapped · 1 guest chưa có ảnh</div>
                </div>
              </div>
              <div style={{ marginTop: 16, display: "flex", justifyContent: "flex-end", gap: 6 }}>
                <Btn onClick={() => setStage("idle")}>Chọn ảnh khác</Btn>
                <Btn variant="primary" icon="arrowRight" onClick={onDone}>Tiếp tục review</Btn>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}
window.UploadModal = UploadModal;
</script>

<script type="text/babel">
// ===== Screen-level wrapper that manages toast for action feedback =====
function useToast() {
  const [toast, setToast] = React.useState(null);
  const show = (message, tone = "ok") => setToast({ message, tone });
  const close = () => setToast(null);
  return { toast, show, close };
}

// Common action handler producing toast feedback for prototype actions
function describeAction(action, payload) {
  if (action === "rowSkipped") return { msg: `Skipped guest ${payload.name}`, tone: "warn" };
  if (action === "rowUnskipped") return { msg: `Restored ${payload.name}`, tone: "ok" };
  if (action === "remap") return { msg: `Re-map photo cho ${payload.name} — picker mở…`, tone: "brand" };
  if (action === "removePhoto") return { msg: `Đã gỡ photo của ${payload.name} khỏi batch`, tone: "warn" };
  if (action === "pickAmbiguous") return { msg: `Đã chọn ${payload.name} cho ảnh — guest còn lại sẽ về No photo`, tone: "ok" };
  if (action === "openCandidates") return { msg: `Mở picker chọn guest cho ảnh ambiguous`, tone: "brand" };
  if (action === "assignFromPool") return { msg: `Mở picker chọn ảnh từ pool cho ${payload.name}`, tone: "brand" };
  if (action === "uploadSingle") return { msg: `Mở file picker để upload ảnh cho ${payload.name}`, tone: "brand" };
  if (action === "viewProfile") return { msg: `Mở Profile Edit của ${payload.name}`, tone: "brand" };
  if (action === "viewBio") return { msg: `bioId của ${payload.name}: ${window.PROTO_DATA.outcomes[payload.profileId].bioId}`, tone: "ok" };
  if (action === "reregister") return { msg: `Re-register sẽ overwrite bioId hiện tại của ${payload.name}`, tone: "warn" };
  if (action === "revoke") return { msg: `Revoke bioId của ${payload.name} — cần confirm dialog`, tone: "danger" };
  if (action === "retry") return { msg: `Re-try ${payload.name} với photo mới — mở picker…`, tone: "brand" };
  if (action === "rerun") return { msg: `Re-run API cho ${payload.name} với photo hiện tại`, tone: "brand" };
  if (action === "rerunFailed") return { msg: `Re-running all 2 failed guests…`, tone: "brand" };
  if (action === "triggerRegister") return { msg: `Trigger Face ID API cho ${payload.name}`, tone: "brand" };
  if (action === "pickCandidate") return { msg: `Đã gán ảnh ${payload.file.file} cho ${payload.guest.name} (R${payload.guest.room})`, tone: "ok" };
  if (action === "assignFile") return { msg: `Đã gán ảnh ${payload.file.file} cho ${payload.guest.name}`, tone: "ok" };
  if (action === "skipFile") return { msg: `Đã skip ảnh ${payload.file.file}`, tone: "warn" };
  if (action === "searchGuest") return { msg: `Mở picker search guest cho ảnh ${payload.file.file}`, tone: "brand" };
  return null;
}

// ===== SCREEN 01 — Default =====
function ScreenDefault() {
  const { toast, show, close } = useToast();
  const handle = (action, payload) => {
    if (action === "openUpload") { window.GO && window.GO(2); return; }
    const d = describeAction(action, payload);
    if (d) show(d.msg, d.tone);
  };
  return (
    <ItineraryShell activeTab="faceid" onTabChange={(t) => t === "activity" && window.GO && window.GO(6)} toast={toast} onToastClose={close}>
      <FaceIdTabContent mode="default" onAction={handle}/>
    </ItineraryShell>
  );
}

// ===== SCREEN 02 — Upload Modal overlaid on Default =====
function ScreenUploadModal() {
  return (
    <ItineraryShell activeTab="faceid">
      <FaceIdTabContent mode="default"/>
      <UploadModal onClose={() => window.GO && window.GO(1)} onDone={() => window.GO && window.GO(3)}/>
    </ItineraryShell>
  );
}

// ===== SCREEN 03 — Reviewing =====
function ScreenReviewing() {
  const { toast, show, close } = useToast();
  const statusBadge = <StatusPill tone="warn"><Icon name="warn" size={11}/> Reviewing batch</StatusPill>;
  const handle = (action, payload) => {
    if (action === "confirm") { window.GO && window.GO(4); return; }
    if (action === "cancel") { window.GO && window.GO(1); return; }
    if (action === "uploadMore" || action === "replace") { window.GO && window.GO(2); return; }
    const d = describeAction(action, payload);
    if (d) show(d.msg, d.tone);
  };
  return (
    <ItineraryShell activeTab="faceid" statusBadge={statusBadge} toast={toast} onToastClose={close}>
      <FaceIdTabContent mode="reviewing" batchVersion={1} onAction={handle}/>
    </ItineraryShell>
  );
}

// ===== SCREEN 04 — Processing modal =====
function ScreenProcessing() {
  const data = window.PROTO_DATA;
  const queue = React.useMemo(() => {
    return data.guests.map(g => {
      const file = data.pickedFiles.find(f => f.match === g.profileId && f.status === "matched")
                || data.pickedFiles.find(f => f.status === "ambiguous" && Array.isArray(f.match) && f.match.includes(g.profileId));
      const outcome = data.outcomes[g.profileId];
      return { ...g, file: file ? file.file : "(manual)", result: outcome.status, bioId: outcome.bioId, error: outcome.error };
    });
  }, []);
  const [idx, setIdx] = React.useState(0);
  const [statuses, setStatuses] = React.useState(() => queue.map(() => "pending"));
  const [done, setDone] = React.useState(false);

  React.useEffect(() => {
    if (done) return;
    if (idx >= queue.length) { setDone(true); return; }
    setStatuses(s => { const ns = [...s]; ns[idx] = "processing"; return ns; });
    const t = setTimeout(() => {
      setStatuses(s => { const ns = [...s]; ns[idx] = queue[idx].result; return ns; });
      setIdx(i => i + 1);
    }, 240 + Math.random() * 180);
    return () => clearTimeout(t);
  }, [idx, done]);

  const counts = {
    done: statuses.filter(s => s === "registered").length,
    photoUploaded: statuses.filter(s => s === "photo-uploaded").length,
    failed: statuses.filter(s => s === "failed").length,
    processing: statuses.filter(s => s === "processing").length,
    pending: statuses.filter(s => s === "pending").length,
  };
  const completed = counts.done + counts.failed + counts.photoUploaded;
  const pct = Math.round(completed / queue.length * 100);
  const statusBadge = <StatusPill tone="brand"><Icon name="scan" size={11}/> Processing</StatusPill>;

  return (
    <ItineraryShell activeTab="faceid" statusBadge={statusBadge}>
      <div style={{ opacity: 0.35, pointerEvents: "none" }}>
        <FaceIdTabContent mode="reviewing"/>
      </div>

      <div style={{ position: "absolute", inset: 0, background: "rgba(17,32,46,0.42)", display: "grid", placeItems: "center", zIndex: 50 }}>
        <div style={{ width: 640, maxHeight: "82%", background: PMS.surface, border: `1px solid ${PMS.border}`, borderRadius: 8, boxShadow: "0 24px 60px rgba(17,32,46,0.18)", overflow: "hidden", display: "flex", flexDirection: "column" }}>
          <div style={{ padding: "14px 18px", borderBottom: `1px solid ${PMS.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontSize: 15, fontWeight: 700, color: PMS.ink }}>{done ? "Hoàn tất batch" : "Đang xử lý Face ID"}</div>
              <div style={{ fontSize: 12, color: PMS.inkMuted, marginTop: 2 }}>Bước 3/3 · {completed} / {queue.length} processed · concurrency = 5</div>
            </div>
            {!done && <Btn size="sm" variant="ghost" icon="x">Cancel</Btn>}
          </div>
          <div style={{ padding: "12px 18px", borderBottom: `1px solid ${PMS.border}` }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 12, color: PMS.inkMuted, marginBottom: 6 }}>
              <span>
                <span style={{ color: PMS.ok, fontWeight: 600 }}>{counts.done} registered</span> ·{" "}
                <span style={{ color: PMS.brand, fontWeight: 600 }}>{counts.photoUploaded} photo-uploaded</span> ·{" "}
                <span style={{ color: PMS.danger, fontWeight: 600 }}>{counts.failed} failed</span> ·{" "}
                <span>{counts.processing} in flight</span> ·{" "}
                <span style={{ color: PMS.inkSubtle }}>{counts.pending} queued</span>
              </span>
              <span>{pct}%</span>
            </div>
            <div style={{ height: 8, background: PMS.bg, borderRadius: 999, overflow: "hidden", display: "flex" }}>
              <div style={{ width: `${counts.done / queue.length * 100}%`, background: PMS.ok, transition: "width 0.3s" }}/>
              <div style={{ width: `${counts.photoUploaded / queue.length * 100}%`, background: PMS.brand, transition: "width 0.3s" }}/>
              <div style={{ width: `${counts.failed / queue.length * 100}%`, background: PMS.danger, transition: "width 0.3s" }}/>
            </div>
          </div>
          <div style={{ overflow: "auto", flex: 1 }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
              <thead>
                <tr style={{ background: PMS.surfaceMuted, color: PMS.inkMuted, fontSize: 11, textTransform: "uppercase", letterSpacing: 0.4, position: "sticky", top: 0 }}>
                  {["#", "File → Guest", "Result"].map((h, i) =>
                    <th key={i} style={{ textAlign: "left", padding: "7px 12px", fontWeight: 500, borderBottom: `1px solid ${PMS.border}` }}>{h}</th>)}
                </tr>
              </thead>
              <tbody>
                {queue.map((q, i) => {
                  const st = statuses[i];
                  return (
                    <tr key={q.confNo} style={{ borderBottom: `1px solid ${PMS.border}`, opacity: st === "pending" ? 0.5 : 1 }}>
                      <td style={{ padding: "6px 12px", color: PMS.inkSubtle, fontFamily: "ui-monospace, Menlo, monospace", fontSize: 11 }}>{String(i + 1).padStart(2, "0")}</td>
                      <td style={{ padding: "6px 12px" }}>
                        <div style={{ fontWeight: 500, fontSize: 12 }}>{q.file}</div>
                        <div style={{ fontSize: 11, color: PMS.inkSubtle }}>→ {q.name} · {q.confNo}</div>
                      </td>
                      <td style={{ padding: "6px 12px", fontFamily: "ui-monospace, Menlo, monospace", fontSize: 11 }}>
                        {st === "pending" && <span style={{ color: PMS.inkSubtle }}>queued…</span>}
                        {st === "processing" && (
                          <span style={{ display: "inline-flex", alignItems: "center", gap: 6, color: PMS.brand, fontWeight: 600 }}>
                            <span style={{ width: 8, height: 8, borderRadius: "50%", background: PMS.brand, animation: "pulse 0.9s ease-in-out infinite" }}/>
                            calling API…
                          </span>
                        )}
                        {st === "registered" && <span style={{ color: PMS.ok }}>✓ {q.bioId}</span>}
                        {st === "photo-uploaded" && <span style={{ color: PMS.brand }}>📷 photo uploaded</span>}
                        {st === "failed" && <span style={{ color: PMS.danger }}>✗ {q.error}</span>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          {done && (
            <div style={{ padding: "10px 18px", background: PMS.surfaceMuted, borderTop: `1px solid ${PMS.border}`, display: "flex", justifyContent: "flex-end", gap: 6 }}>
              <Btn variant="primary" icon="arrowRight" onClick={() => window.GO && window.GO(5)}>Xem kết quả →</Btn>
            </div>
          )}
        </div>
      </div>
    </ItineraryShell>
  );
}

// ===== SCREEN 05 — Resolved =====
function ScreenResolved() {
  const data = window.PROTO_DATA;
  const { toast, show, close } = useToast();
  const [bannerDismissed, setBannerDismissed] = React.useState(false);
  const okCount = Object.values(data.outcomes).filter(o => o.status === "registered").length;
  const failCount = Object.values(data.outcomes).filter(o => o.status === "failed").length;
  const pendingCount = Object.values(data.outcomes).filter(o => o.status === "photo-uploaded").length;
  const failedNames = data.guests
    .filter(g => data.outcomes[g.profileId] && data.outcomes[g.profileId].status === "failed")
    .map(g => `${g.name} (${data.outcomes[g.profileId].error})`)
    .join(", ");
  const statusBadge = <StatusPill tone="accent"><Icon name="face" size={11}/> {okCount}/{data.guests.length} sẵn sàng</StatusPill>;
  const handle = (action, payload) => {
    if (action === "openUpload") { window.GO && window.GO(2); return; }
    if (action === "retry") { window.GO && window.GO(2); return; }
    const d = describeAction(action, payload);
    if (d) show(d.msg, d.tone);
  };

  return (
    <ItineraryShell activeTab="faceid" onTabChange={(t) => t === "activity" && window.GO && window.GO(6)} statusBadge={statusBadge} toast={toast} onToastClose={close}>
      {!bannerDismissed && (
        <div style={{ background: failCount > 0 ? PMS.warnSoft : PMS.okSoft, border: `1px solid ${failCount > 0 ? "#EBC79A" : "#BFE0CF"}`, borderRadius: 6, padding: "12px 14px", display: "flex", gap: 10, alignItems: "flex-start", marginBottom: 12 }}>
          <div style={{ color: failCount > 0 ? PMS.warn : PMS.ok, marginTop: 1 }}><Icon name={failCount > 0 ? "warn" : "check"} size={18}/></div>
          <div style={{ flex: 1, fontSize: 12, color: PMS.ink, lineHeight: 1.55 }}>
            <strong>Batch complete · {okCount} registered · {pendingCount} photo uploaded · {failCount} failed · 28/12/2025 09:42</strong>
            {failCount > 0 && <div style={{ marginTop: 4, color: PMS.inkMuted }}>{failCount} failed: {failedNames}</div>}
            <div style={{ marginTop: 8, display: "flex", gap: 6 }}>
              {failCount > 0 && <Btn size="sm" variant="primary" icon="refresh" onClick={() => show(`Re-running ${failCount} failed guests…`, "brand")}>Re-run failed</Btn>}
              <Btn size="sm" icon="history" onClick={() => window.GO && window.GO(6)}>View Activity Logs →</Btn>
            </div>
          </div>
          <Btn size="sm" variant="ghost" icon="x" onClick={() => setBannerDismissed(true)}>Dismiss</Btn>
        </div>
      )}
      <FaceIdTabContent mode="resolved" onAction={handle}/>
    </ItineraryShell>
  );
}

// ===== SCREEN 06 — Activity Logs =====
function ScreenActivityLogs() {
  const data = window.PROTO_DATA;
  const [expanded, setExpanded] = React.useState(new Set(["log-005"]));
  const toggle = (id) => setExpanded(prev => { const n = new Set(prev); if (n.has(id)) n.delete(id); else n.add(id); return n; });
  const typeIcon = {
    batch: { icon: "scan", color: PMS.brand }, manual: { icon: "user", color: PMS.accent },
    revoke: { icon: "trash", color: PMS.danger }, consent: { icon: "lock", color: PMS.warn },
    open: { icon: "folder", color: PMS.inkMuted },
  };
  const typeLabel = { batch: "Bulk batch", manual: "Manual map", revoke: "Revoke bioID", consent: "PDPA consent", open: "Itinerary opened" };

  return (
    <ItineraryShell activeTab="activity" onTabChange={(t) => t === "faceid" && window.GO && window.GO(1)}>
      <div style={{ background: PMS.surface, border: `1px solid ${PMS.border}`, borderRadius: 6, overflow: "hidden" }}>
        <div style={{ padding: "10px 14px", borderBottom: `1px solid ${PMS.border}`, background: PMS.surfaceMuted, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontSize: 13, fontWeight: 600, color: PMS.ink }}>Activity Logs</div>
            <div style={{ fontSize: 11, color: PMS.inkMuted, marginTop: 1 }}>Audit log đầy đủ theo NĐ 13/2023/NĐ-CP — Điều 26 · {data.activityLogs.length} entries</div>
          </div>
          <Btn size="sm" icon="download2">Export CSV</Btn>
        </div>
        <div>
          {data.activityLogs.map(log => {
            const meta = typeIcon[log.type];
            const isOpen = expanded.has(log.id);
            return (
              <div key={log.id} style={{ borderBottom: `1px solid ${PMS.border}` }}>
                <div onClick={() => toggle(log.id)} style={{ display: "flex", alignItems: "flex-start", gap: 12, padding: "12px 14px", cursor: "pointer" }}>
                  <div style={{ width: 32, height: 32, borderRadius: 6, background: meta.color + "15", color: meta.color, display: "grid", placeItems: "center", flexShrink: 0 }}>
                    <Icon name={meta.icon} size={16}/>
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{ fontSize: 13, fontWeight: 600, color: PMS.ink }}>{typeLabel[log.type]}</span>
                      <span style={{ fontSize: 11, color: PMS.inkSubtle, fontFamily: "ui-monospace, Menlo, monospace" }}>{log.timestamp}</span>
                      <span style={{ fontSize: 11, color: PMS.inkMuted }}>· by {log.actor} ({log.actorIp})</span>
                    </div>
                    <div style={{ fontSize: 12, color: PMS.inkMuted, marginTop: 3 }}>{log.detail}</div>
                  </div>
                  <div style={{ color: PMS.inkSubtle, padding: 4 }}><Icon name={isOpen ? "chevronDown" : "chevronRight"} size={14}/></div>
                </div>
                {isOpen && log.type === "batch" && (
                  <div style={{ padding: "0 14px 14px 58px", background: PMS.surfaceMuted, borderTop: `1px solid ${PMS.border}` }}>
                    <div style={{ padding: "10px 0", fontSize: 12, color: PMS.ink }}>
                      <div style={{ marginBottom: 8 }}><strong>Summary:</strong> {log.summary.totalFiles} files · {log.summary.ok} ✓ · {log.summary.fail} ✗ · {log.summary.skipped} skipped · {log.summary.durationSec}s</div>
                      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, background: PMS.surface, border: `1px solid ${PMS.border}` }}>
                        <thead>
                          <tr style={{ background: PMS.surface, color: PMS.inkMuted, textTransform: "uppercase", letterSpacing: 0.4 }}>
                            {["Conf. No", "Guest", "File", "Registration Status", "bioId / Error"].map((h, i) =>
                              <th key={i} style={{ textAlign: "left", padding: "6px 10px", fontWeight: 500, borderBottom: `1px solid ${PMS.border}` }}>{h}</th>)}
                          </tr>
                        </thead>
                        <tbody>
                          {data.guests.map(g => {
                            const file = data.pickedFiles.find(f => f.match === g.profileId && f.status === "matched")
                                      || data.pickedFiles.find(f => f.status === "ambiguous" && Array.isArray(f.match) && f.match.includes(g.profileId));
                            const o = data.outcomes[g.profileId];
                            return (
                              <tr key={g.confNo} style={{ borderBottom: `1px solid ${PMS.border}` }}>
                                <td style={{ padding: "5px 10px", fontFamily: "ui-monospace, Menlo, monospace", color: PMS.inkMuted }}>{g.confNo}</td>
                                <td style={{ padding: "5px 10px" }}>{g.name}</td>
                                <td style={{ padding: "5px 10px", color: PMS.inkMuted, fontFamily: "ui-monospace, Menlo, monospace", fontSize: 10 }}>{file ? file.file : "—"}</td>
                                <td style={{ padding: "5px 10px" }}>
                                  {o.status === "registered" && <span style={{ color: PMS.ok, fontWeight: 600 }}>✓ Registered</span>}
                                  {o.status === "photo-uploaded" && <span style={{ color: PMS.brand, fontWeight: 600 }}>📷 Photo Uploaded</span>}
                                  {o.status === "failed" && <span style={{ color: PMS.danger, fontWeight: 600 }}>✗ Failed</span>}
                                </td>
                                <td style={{ padding: "5px 10px", fontFamily: "ui-monospace, Menlo, monospace", fontSize: 10 }}>
                                  {o.bioId && <span style={{ color: PMS.ok }}>{o.bioId}</span>}
                                  {o.error && <span style={{ color: PMS.danger }}>{o.error}</span>}
                                  {!o.bioId && !o.error && <span style={{ color: PMS.inkSubtle }}>—</span>}
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}
                {isOpen && log.type !== "batch" && (
                  <div style={{ padding: "10px 14px 14px 58px", background: PMS.surfaceMuted, borderTop: `1px solid ${PMS.border}` }}>
                    <pre style={{ margin: 0, fontSize: 11, color: PMS.ink, fontFamily: "ui-monospace, Menlo, monospace", whiteSpace: "pre-wrap" }}>{JSON.stringify(log.summary, null, 2)}</pre>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </ItineraryShell>
  );
}

window.ScreenDefault = ScreenDefault;
window.ScreenUploadModal = ScreenUploadModal;
window.ScreenReviewing = ScreenReviewing;
window.ScreenProcessing = ScreenProcessing;
window.ScreenResolved = ScreenResolved;
window.ScreenActivityLogs = ScreenActivityLogs;
</script>

</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useLayoutEffect } = React;

const SCREENS = [
  { id: "s1", label: "01 · Default",          Component: ScreenDefault,       width: 1440, height: 900 },
  { id: "s2", label: "02 · Upload modal",     Component: ScreenUploadModal,   width: 1440, height: 900 },
  { id: "s3", label: "03 · Reviewing",        Component: ScreenReviewing,     width: 1440, height: 1080 },
  { id: "s4", label: "04 · Processing modal", Component: ScreenProcessing,    width: 1440, height: 1000 },
  { id: "s5", label: "05 · Resolved",         Component: ScreenResolved,      width: 1440, height: 1000 },
  { id: "s6", label: "06 · Activity Logs",    Component: ScreenActivityLogs,  width: 1440, height: 900 },
];

function App() {
  const [step, setStep] = useState(1);
  const frameRef = useRef(null);
  const [scale, setScale] = useState(1);

  useEffect(() => { window.GO = (n) => { if (typeof n === "number" && n >= 1 && n <= SCREENS.length) setStep(n); }; }, []);

  const current = SCREENS[step - 1];

  useLayoutEffect(() => {
    const compute = () => {
      const frame = frameRef.current; if (!frame) return;
      const rect = frame.getBoundingClientRect();
      const padding = 32;
      const sx = (rect.width  - padding) / current.width;
      const sy = (rect.height - padding) / current.height;
      const next = Math.min(sx, sy, 1);
      setScale(next > 0 ? next : 1);
    };
    compute();
    window.addEventListener("resize", compute);
    return () => window.removeEventListener("resize", compute);
  }, [step]);

  useEffect(() => {
    const onKey = (e) => {
      if (e.target && (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.isContentEditable)) return;
      if (e.key === "ArrowRight") setStep((s) => Math.min(SCREENS.length, s + 1));
      if (e.key === "ArrowLeft")  setStep((s) => Math.max(1, s - 1));
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  return (
    <>
      <div className="nav-bar">
        <span className="title">v2.1 · Face ID Registration · actions + 4-state registration</span>
        {SCREENS.map((s, i) => (
          <span key={s.id} className={"step" + (i + 1 === step ? " active" : "")} onClick={() => setStep(i + 1)}>{s.label}</span>
        ))}
        <span className="hint">← → để chuyển màn hình</span>
        <button className="icon" onClick={() => setStep((s) => Math.max(1, s - 1))} disabled={step === 1}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18 9 12l6-6"/></svg>
        </button>
        <button className="icon" onClick={() => setStep((s) => Math.min(SCREENS.length, s + 1))} disabled={step === SCREENS.length}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </div>
      <div className="app-frame" ref={frameRef}>
        <div className="stage" style={{ width: current.width, height: current.height, transform: `scale(${scale})` }} key={current.id}>
          <current.Component/>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
