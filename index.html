const Btn = ({ variant = "default", icon, children, onClick, disabled, size = "md", style = {} }) => {
  const v = {
    primary: { bg: pms.brand, fg: "#fff", border: pms.brand },
    default: { bg: pms.surface, fg: pms.ink, border: pms.borderStrong },
    ghost: { bg: "transparent", fg: pms.inkMuted, border: "transparent" },
    danger: { bg: pms.surface, fg: pms.danger, border: pms.borderStrong },
    success: { bg: pms.accent, fg: "#fff", border: pms.accent },
  }[variant];
  const pad = size === "sm" ? "4px 10px" : size === "lg" ? "9px 18px" : "6px 14px";
  const fs = size === "sm" ? 12 : size === "lg" ? 14 : 13;
  return (
    <button onClick={onClick} disabled={disabled} style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: pad, fontSize: fs, fontWeight: 500, borderRadius: 5, background: v.bg, color: v.fg, border: `1px solid ${v.border}`, cursor: disabled ? "not-allowed" : "pointer", opacity: disabled ? 0.5 : 1, fontFamily: "inherit", ...style }}>
      {icon && <Icon name={icon} size={fs}/>}
      {children}
    </button>
  );
};

const FacePlaceholder = ({ size = 36, name = "", state = "default" }) => {
  const palette = [["#E6F0F7","#0F5A8A"],["#FBEFE0","#B6601B"],["#E2F2EE","#0E7C66"],["#FBE8E5","#B0372F"],["#EEEAF7","#5A3D9E"],["#F2EAE0","#7A5530"]];
  let h = 0;
  for (let i = 0; i < name.length; i++) h = h * 31 + name.charCodeAt(i) | 0;
  const [bg, fg] = palette[Math.abs(h) % palette.length];
  const initials = name.split(/\s+/).filter(Boolean).slice(-2).map(s => s[0]).join("").toUpperCase() || "?";
  if (state === "missing" || state === "empty") {
    return (
      <div style={{ width: size, height: size, borderRadius: 4, background: "#F4F6F8", border: `1px dashed ${pms.borderStrong}`, display: "grid", placeItems: "center", color: pms.inkSubtle, flexShrink: 0 }}>
        <Icon name="image" size={size * 0.5}/>
      </div>
    );
  }
  return (
    <div style={{ width: size, height: size, borderRadius: 4, background: bg, color: fg, display: "grid", placeItems: "center", fontSize: size * 0.36, fontWeight: 600, flexShrink: 0, position: "relative", overflow: "hidden",
      backgroundImage: `radial-gradient(ellipse at 50% 38%, ${fg}22 0 ${size * 0.18}px, transparent ${size * 0.2}px), radial-gradient(ellipse at 50% 78%, ${fg}33 0 ${size * 0.32}px, transparent ${size * 0.34}px)` }}>
      <span style={{ position: "absolute", bottom: 1, right: 2, fontSize: size * 0.22, fontWeight: 700, color: fg, opacity: 0.55 }}>{initials}</span>
    </div>
  );
};

function DropdownMenu({ children, items, align = "right" }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!open) return;
    const close = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", close);
    return () => document.removeEventListener("mousedown", close);
  }, [open]);
  return (
    <div ref={ref} style={{ position: "relative", display: "inline-block" }}>
      <div onClick={(e) => { e.stopPropagation(); setOpen(o => !o); }} style={{ cursor: "pointer", display: "inline-flex" }}>{children}</div>
      {open && (
        <div style={{ position: "absolute", top: "calc(100% + 4px)", [align]: 0, zIndex: 40, minWidth: 220, background: pms.surface, border: `1px solid ${pms.borderStrong}`, borderRadius: 6, boxShadow: "0 10px 28px rgba(17,32,46,0.18)", overflow: "hidden", padding: 4 }}>
          {items.map((item, i) => (
            item.divider ? <div key={i} style={{ height: 1, background: pms.border, margin: "4px 0" }}/> :
            item.header ? <div key={i} style={{ fontSize: 10, color: pms.inkSubtle, textTransform: "uppercase", letterSpacing: 0.6, padding: "6px 10px 2px" }}>{item.header}</div> :
            <div key={i} onClick={() => { setOpen(false); item.onClick && item.onClick(); }}
              style={{ padding: "7px 10px", fontSize: 12, color: item.danger ? pms.danger : pms.ink, cursor: "pointer", borderRadius: 4, display: "flex", alignItems: "center", gap: 8 }}
              onMouseEnter={(e) => e.currentTarget.style.background = pms.surfaceMuted}
              onMouseLeave={(e) => e.currentTarget.style.background = "transparent"}>
              {item.icon && <Icon name={item.icon} size={13} stroke={item.danger ? pms.danger : pms.inkMuted}/>}
              <span style={{ flex: 1 }}>{item.label}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function Toast({ message, tone = "ok", onClose }) {
  React.useEffect(() => {
    if (!message) return;
    const t = setTimeout(onClose, 2400);
    return () => clearTimeout(t);
  }, [message, onClose]);
  if (!message) return null;
  const bg = tone === "ok" ? pms.ok : tone === "warn" ? pms.warn : tone === "danger" ? pms.danger : pms.brand;
  return (
    <div style={{ position: "absolute", bottom: 24, left: "50%", transform: "translateX(-50%)", zIndex: 100, background: bg, color: "#fff", borderRadius: 6, padding: "10px 16px", fontSize: 13, fontWeight: 500, boxShadow: "0 10px 28px rgba(17,32,46,0.24)", animation: "toastIn 0.2s ease-out" }}>
      {message}
    </div>
  );
}

window.PMS = PMS; window.Icon = Icon; window.TopBar = TopBar; window.SideNav = SideNav;
window.StatusPill = StatusPill; window.Btn = Btn; window.FacePlaceholder = FacePlaceholder;
window.DropdownMenu = DropdownMenu; window.Toast = Toast;
</script>

// ===== Photo Mapping pill =====
function PhotoMappingPill({ state }) {
  if (state === "skipped")     return <StatusPill tone="neutral" dot={false}>⊝ Skipped</StatusPill>;
  if (state === "mapped")      return <StatusPill tone="ok">✓ Mapped</StatusPill>;
  if (state === "needs-review")return <StatusPill tone="warn">⚠ Needs review</StatusPill>;
  if (state === "unmapped")    return <StatusPill tone="warn" dot={false}>◯ Unmapped</StatusPill>;
  return <StatusPill tone="neutral" dot={false}>◯ Not Uploaded</StatusPill>;
}

// ===== Registration Status pill =====
function RegistrationStatusPill({ state, bioId, error }) {
  if (state === "registered") {
    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>

      <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>

        {error && <div style={{ fontSize: 10, color: PMS.danger, paddingLeft: 2 }}>{error}</div>}

}

      return [

        { label: "Upload photo for this guest", icon: "upload", onClick: () => onAction && onAction("uploadSingle", guest) },

      return [

<script type="text/babel">
// ===== Main shared content of Face ID Registration tab =====
function FaceIdTabContent({ mode, onAction, batchVersion, onToast }) {
  const data = window.PROTO_DATA;

  // Mutable copy of pickedFiles + skip sets for live transitions
  const [batchFiles, setBatchFiles] = React.useState(() => data.pickedFiles.map(f => ({ ...f })));
  const [skippedGuestIds, setSkippedGuestIds] = React.useState(() => new Set());
  const [skippedFileNames, setSkippedFileNames] = React.useState(() => new Set());
  const [filter, setFilter] = React.useState("all");
  const [search, setSearch] = React.useState("");

  // Reset state when mode changes (so going Reviewing → Default doesn't carry over skips)
  React.useEffect(() => {
    setBatchFiles(data.pickedFiles.map(f => ({ ...f })));
    setSkippedGuestIds(new Set());
    setSkippedFileNames(new Set());
    setFilter("all");
  }, [mode]);

  // ----- Derive rows -----
  const rows = React.useMemo(() => {
    return data.guests.map(g => {
      if (skippedGuestIds.has(g.profileId)) {
        return { guest: g, file: null, photoMapping: "skipped", regStatus: "unregistered" };
      }
      // Find file currently mapped to this guest
      const matchedFile = batchFiles.find(f => !skippedFileNames.has(f.file) && f.status === "matched" && f.match === g.profileId);
      if (matchedFile) {
        const outcome = mode === "resolved" ? data.outcomes[g.profileId] : null;
        return {
          guest: g, file: matchedFile, photoMapping: "mapped",
          regStatus: outcome ? outcome.status : "unregistered",
          bioId: outcome ? outcome.bioId : undefined,
          error: outcome ? outcome.error : undefined,
        };
      }
      const ambigFile = batchFiles.find(f => !skippedFileNames.has(f.file) && f.status === "ambiguous" && Array.isArray(f.match) && f.match.includes(g.profileId));
      if (ambigFile) {
        return { guest: g, file: ambigFile, photoMapping: "needs-review", regStatus: "unregistered" };
      }
      // No file for this guest
      const pm = mode === "default" ? "not-uploaded" : "unmapped";
      return { guest: g, file: null, photoMapping: pm, regStatus: "unregistered" };
    });
  }, [mode, batchFiles, skippedGuestIds, skippedFileNames]);

  // Attention files (ambiguous + unmapped, not skipped)
  const attentionFiles = batchFiles.filter(f =>
    !skippedFileNames.has(f.file) && (f.status === "ambiguous" || f.status === "unmapped")
  );

  // Counts for stats banner + filter tabs
  const photoCounts = {
    mapped:        rows.filter(r => r.photoMapping === "mapped").length,
    unmapped:      rows.filter(r => r.photoMapping === "unmapped" || r.photoMapping === "not-uploaded").length,
    "needs-review":rows.filter(r => r.photoMapping === "needs-review").length,
    skipped:       rows.filter(r => r.photoMapping === "skipped").length,
    all:           rows.length,
  };
  const regCounts = {
    registered: rows.filter(r => r.regStatus === "registered").length,
    failed:     rows.filter(r => r.regStatus === "failed").length,
  };
  const ready = photoCounts.mapped; // ready to register

  // Apply filter + search
  const visible = rows.filter(r => {
    if (filter !== "all") {
      if (filter === "unmapped" && !(r.photoMapping === "unmapped" || r.photoMapping === "not-uploaded")) return false;
      if (filter !== "unmapped" && r.photoMapping !== filter) return false;
    }
    if (search && !r.guest.confNo.toLowerCase().includes(search.toLowerCase()) && !r.guest.name.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  // ----- Action handlers (transitions inside Reviewing) -----
  const pickAmbiguous = (file, guest) => {
    setBatchFiles(prev => prev.map(f => f.file === file.file ? { ...f, match: guest.profileId, status: "matched" } : f));
    onToast && onToast(`Đã gán ${file.file} cho ${guest.name} (R${guest.room})`, "ok");
  };
  const assignUnmapped = (file, guest) => {
    setBatchFiles(prev => prev.map(f => f.file === file.file ? { ...f, match: guest.profileId, status: "matched" } : f));
    onToast && onToast(`Đã gán ${file.file} cho ${guest.name}`, "ok");
  };
  const skipFile = (file) => {
    setSkippedFileNames(prev => new Set([...prev, file.file]));
    onToast && onToast(`Đã skip file ${file.file}`, "warn");
  };
  const skipGuest = (guest) => {
    setSkippedGuestIds(prev => new Set([...prev, guest.profileId]));
    onToast && onToast(`Skipped guest ${guest.name}`, "warn");
  };
  const unskipGuest = (guest) => {
    setSkippedGuestIds(prev => { const n = new Set(prev); n.delete(guest.profileId); return n; });
    onToast && onToast(`Restored ${guest.name}`, "ok");
  };

  // Row action dispatcher
  const handleRowAction = (action, guest) => {
    if (action === "skip") return skipGuest(guest);
    if (action === "unskip") return unskipGuest(guest);
    if (action === "pickAmbiguous") {
      // Find ambig file linked to this guest
      const f = batchFiles.find(f => f.status === "ambiguous" && Array.isArray(f.match) && f.match.includes(guest.profileId));
      if (f) pickAmbiguous(f, guest);
      return;
    }
    if (action === "reUploadPhoto") return onToast && onToast(`Mở file picker để re-upload photo cho ${guest.name}`, "brand");
    if (action === "uploadSingle") return onToast && onToast(`Mở picker upload photo cho ${guest.name}`, "brand");
    if (action === "viewProfile") return onToast && onToast(`Mở Profile Edit của ${guest.name}`, "brand");
    if (action === "revoke") return onToast && onToast(`Revoke bioId của ${guest.name} — cần confirm dialog`, "danger");
    if (action === "retry") return onAction && onAction("openUpload");
    if (action === "rerun") return onToast && onToast(`Re-run API cho ${guest.name} với photo hiện tại`, "brand");
    onAction && onAction(action, guest);
  };

  // ===== Stats banner (5 stats) =====
  const banner = (
    <StatsBanner stats={[
      { label: "Mapped",       value: photoCounts.mapped,        tone: photoCounts.mapped > 0 ? "ok" : "neutral" },
      { label: "Unmapped",     value: photoCounts.unmapped,      tone: photoCounts.unmapped > 0 ? "warn" : "neutral" },
      { label: "Needs review", value: photoCounts["needs-review"], tone: photoCounts["needs-review"] > 0 ? "warn" : "neutral" },
      { label: "Registered",   value: regCounts.registered,      tone: regCounts.registered > 0 ? "ok" : "neutral" },
      { label: "Failed",       value: regCounts.failed,          tone: regCounts.failed > 0 ? "danger" : "neutral" },
    ]}/>
  );

  // ===== Top action area =====
  let topActions;
  if (mode === "default" || mode === "resolved") {
    // Same CTAs across Default and Resolved
    topActions = (
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, background: PMS.surface, border: `1px solid ${PMS.border}`, borderRadius: 6, padding: "10px 14px" }}>
        <div style={{ fontSize: 12, color: PMS.inkMuted }}>
          {mode === "default"
            ? <><strong style={{ color: PMS.ink }}>{data.guests.length}</strong> guests trong đoàn · chưa khách nào đăng ký Face ID</>
            : <><strong style={{ color: PMS.ink }}>{regCounts.registered} / {data.guests.length}</strong> guests sẵn sàng Face ID check-in</>}
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          <Btn icon="plus" onClick={() => onToast && onToast("Mở picker chọn single guest để map", "brand")}>+ Map single guest</Btn>
          <Btn variant="primary" icon="upload" onClick={() => onAction && onAction("openUpload")}>Đăng ký Face ID hàng loạt</Btn>
        </div>
      </div>
    );
  } else { // reviewing
    topActions = (
      <div style={{ background: PMS.warnSoft, border: `1px solid #EBC79A`, borderRadius: 6, padding: "10px 14px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
          <div style={{ fontSize: 12, color: PMS.ink }}>
            <strong>⚠ Đang review batch #{batchVersion || 1}</strong> · {batchFiles.length} files → {data.guests.length} guests ·{" "}
            <span style={{ color: PMS.ok }}>✓ {photoCounts.mapped} mapped</span> ·{" "}
            <span style={{ color: PMS.warn }}>⚠ {photoCounts["needs-review"]} needs review</span> ·{" "}
            <span style={{ color: PMS.inkMuted }}>◯ {photoCounts.unmapped} unmapped</span>
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            <Btn size="sm" icon="upload" onClick={() => onAction && onAction("uploadMore")}>Upload more photo</Btn>
            <Btn size="sm" variant="primary" icon="scan" disabled={ready === 0} onClick={() => onAction && onAction("confirm")}>
              Confirm {ready} & Register →
            </Btn>
          </div>
        </div>
      </div>
    );
  }

  return (
    <>
      {banner}
      <div style={{ marginTop: 12 }}>{topActions}</div>

      {/* Cần xử lý — only in reviewing */}
      {mode === "reviewing" && attentionFiles.length > 0 && (
        <div style={{ marginTop: 12 }}>
          <AttentionSection
            files={attentionFiles}
            guests={data.guests}
            onPick={pickAmbiguous}
            onAssign={assignUnmapped}
            onSkip={skipFile}
          />
        </div>
      )}

      {/* Filter tabs */}
      <div style={{ marginTop: 12 }}>
        <FilterTabs active={filter} onChange={setFilter} counts={photoCounts}/>
      </div>

      {/* Search + count */}
      <div style={{ marginTop: 8, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, background: PMS.surface, border: `1px solid ${PMS.border}`, borderRadius: 6, padding: "6px 10px" }}>
        <div style={{ fontSize: 12, color: PMS.inkMuted }}>Hiển thị {visible.length} / {rows.length} guests</div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "4px 10px", borderRadius: 5, border: `1px solid ${PMS.border}`, fontSize: 12, color: PMS.inkSubtle, minWidth: 240 }}>
          <Icon name="search" size={13}/>
          <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Tìm theo conf. no hoặc tên…" style={{ border: "none", outline: "none", background: "transparent", fontSize: 12, color: PMS.ink, flex: 1 }}/>
        </div>
      </div>

      {/* Main list — 2-column status (Photo Mapping + Registration Status) */}
      <div style={{ marginTop: 8, background: PMS.surface, border: `1px solid ${PMS.border}`, borderRadius: 6, overflow: "visible" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
          <thead>
            <tr style={{ background: PMS.surfaceMuted, color: PMS.inkMuted, fontSize: 11, textTransform: "uppercase", letterSpacing: 0.4 }}>
              {["Conf. No", "Guest", "Photo", "Photo Mapping", "Registration Status", ""].map((h, i) =>
                <th key={i} style={{ textAlign: "left", padding: "9px 12px", fontWeight: 500, borderBottom: `1px solid ${PMS.border}` }}>{h}</th>)}
            </tr>
          </thead>
          <tbody>
            {visible.length === 0 && (
              <tr>
                <td colSpan={6} style={{ padding: "32px 12px", textAlign: "center", color: PMS.inkSubtle, fontSize: 12 }}>
                  Không có guest nào khớp filter "{filter}" {search && `+ search "${search}"`}.
                </td>
              </tr>
            )}
            {visible.map(r => (
              <GuestRow
                key={r.guest.confNo}
                guest={r.guest}
                mode={mode}
                file={mode === "default" ? null : r.file}
                photoMapping={r.photoMapping}
                regStatus={r.regStatus}
                bioId={r.bioId}
                error={r.error}
                onAction={handleRowAction}
              />
            ))}
          </tbody>
        </table>
      </div>
    </>
  );
}
window.FaceIdTabContent = FaceIdTabContent;
</script>

<script type="text/babel">
// ===== Upload Modal =====
function UploadModal({ onClose, onDone }) {
  const [stage, setStage] = React.useState("idle");
  const [progress, setProgress] = React.useState(0);
  const [consent, setConsent] = React.useState(false);

  React.useEffect(() => {
    if (stage === "uploading") {
      const t = setInterval(() => setProgress(p => {
        const np = Math.min(100, p + 8);
        if (np >= 100) { clearInterval(t); setTimeout(() => setStage("matching"), 250); }
        return np;
      }), 100);
      return () => clearInterval(t);
    }
    if (stage === "matching") {
      const t = setTimeout(() => setStage("done"), 1000);
      return () => clearTimeout(t);
    }
  }, [stage]);

  return (
    <div style={{ position: "absolute", inset: 0, background: "rgba(17,32,46,0.42)", display: "grid", placeItems: "center", zIndex: 50 }}>
      <div style={{ width: 640, background: PMS.surface, border: `1px solid ${PMS.border}`, borderRadius: 8, boxShadow: "0 24px 60px rgba(17,32,46,0.18)", overflow: "hidden" }}>
        <div style={{ padding: "14px 18px", borderBottom: `1px solid ${PMS.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontSize: 15, fontWeight: 700, color: PMS.ink }}>Đăng ký Face ID hàng loạt</div>
            <div style={{ fontSize: 12, color: PMS.inkMuted, marginTop: 2 }}>
              {stage === "idle" && "Bước 1/3 · Chọn file ảnh"}
              {(stage === "uploading" || stage === "matching") && "Bước 1/3 · Đang upload + auto-match"}
              {stage === "done" && "Bước 1/3 · Hoàn tất — sẵn sàng review"}
            </div>
          </div>
          <Btn size="sm" variant="ghost" icon="x" onClick={onClose}>Đóng</Btn>
        </div>
        <div style={{ display: "flex", gap: 6, padding: "10px 18px", background: PMS.surfaceMuted, borderBottom: `1px solid ${PMS.border}`, fontSize: 11 }}>
          {["1. Chọn ảnh", "2. Review mapping", "3. Confirm & Register"].map((s, i) => (
            <React.Fragment key={i}>
              <span style={{ color: i === 0 ? PMS.brand : PMS.inkSubtle, fontWeight: i === 0 ? 600 : 500 }}>{s}</span>
              {i < 2 && <span style={{ color: PMS.inkSubtle }}>›</span>}
            </React.Fragment>
          ))}
        </div>
        <div style={{ padding: 18 }}>
          {stage === "idle" && (
            <>
              <div onClick={() => consent && setStage("uploading")} style={{ border: `2px dashed ${consent ? PMS.borderStrong : PMS.border}`, borderRadius: 8, padding: "32px 20px", textAlign: "center", background: PMS.surfaceMuted, cursor: consent ? "pointer" : "not-allowed", opacity: consent ? 1 : 0.55 }}>
                <div style={{ display: "inline-grid", placeItems: "center", width: 52, height: 52, borderRadius: 12, background: PMS.brandSoft, color: PMS.brand, marginBottom: 10 }}>
                  <Icon name="upload" size={26}/>
                </div>
                <div style={{ fontSize: 14, fontWeight: 600, color: PMS.ink }}>Kéo thả ảnh JPG/PNG/JPEG, hoặc click để chọn</div>
                <div style={{ fontSize: 12, color: PMS.inkMuted, marginTop: 4, lineHeight: 1.6 }}>
                  Multi-select · tên file = họ tên khách (vd <code style={{ background: PMS.bg, padding: "1px 5px", borderRadius: 3 }}>nguyen thi van.jpg</code>)<br/>
                  Tối đa 200 ảnh · Mỗi ảnh ≤ 5 MB · Tổng ≤ 500 MB
                </div>
              </div>
              <div style={{ marginTop: 14, padding: 12, background: PMS.warnSoft, border: `1px solid #EBC79A`, borderRadius: 6, display: "flex", gap: 10, alignItems: "flex-start" }}>
                <div style={{ color: PMS.warn, marginTop: 1 }}><Icon name="lock" size={16}/></div>
                <label style={{ fontSize: 12, color: PMS.ink, lineHeight: 1.55, flex: 1, cursor: "pointer", display: "flex", gap: 8, alignItems: "flex-start" }}>
                  <input type="checkbox" checked={consent} onChange={(e) => setConsent(e.target.checked)} style={{ marginTop: 2 }}/>
                  <span><strong>PDPA consent.</strong> Khách đã đồng ý cho khách sạn lưu ảnh khuôn mặt phục vụ check-in. Mọi thao tác được ghi audit log. (NĐ 13/2023/NĐ-CP)</span>
                </label>
              </div>
              <div style={{ marginTop: 14, display: "flex", justifyContent: "flex-end", gap: 6 }}>
                <Btn onClick={onClose}>Huỷ</Btn>
                <Btn variant="primary" icon="folder" disabled={!consent} onClick={() => setStage("uploading")}>Chọn ảnh từ máy</Btn>
              </div>
            </>
          )}
          {(stage === "uploading" || stage === "matching") && (
            <>
              <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 12px", border: `1px solid ${PMS.border}`, borderRadius: 6 }}>
                <div style={{ width: 38, height: 38, borderRadius: 6, background: PMS.brandSoft, color: PMS.brand, display: "grid", placeItems: "center" }}><Icon name="upload" size={20}/></div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: PMS.ink }}>19 ảnh · 8.4 MB</div>
                  <div style={{ fontSize: 11, color: PMS.inkMuted }}>
                    {stage === "uploading" ? `Đang upload lên S3… ${progress}%` : "Đang chuẩn hoá tên + auto-match với 18 guest profile…"}
                  </div>
                </div>
                <Btn size="sm" variant="ghost" icon="x" onClick={onClose}>Huỷ</Btn>
              </div>
              <div style={{ height: 6, marginTop: 14, background: PMS.bg, borderRadius: 999, overflow: "hidden" }}>
                <div style={{ height: "100%", width: stage === "uploading" ? `${progress}%` : "100%", background: stage === "uploading" ? PMS.brand : PMS.accent, transition: "width 0.2s" }}/>
              </div>
            </>
          )}
          {stage === "done" && (
            <>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{ width: 32, height: 32, borderRadius: "50%", background: PMS.okSoft, color: PMS.ok, display: "grid", placeItems: "center" }}><Icon name="check" size={18}/></div>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 600 }}>Đã upload 19 ảnh</div>
                  <div style={{ fontSize: 12, color: PMS.inkMuted }}>15 mapped · 1 needs review · 3 unmapped · 1 guest chưa có ảnh</div>
                </div>
              </div>
              <div style={{ marginTop: 16, display: "flex", justifyContent: "flex-end", gap: 6 }}>
                <Btn onClick={() => setStage("idle")}>Chọn ảnh khác</Btn>
                <Btn variant="primary" icon="arrowRight" onClick={onDone}>Tiếp tục review</Btn>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}
window.UploadModal = UploadModal;
</script>

<script type="text/babel">
// ===== Screen wrappers =====
function useToast() {
  const [toast, setToast] = React.useState(null);
  return { toast, show: (m, t = "ok") => setToast({ message: m, tone: t }), close: () => setToast(null) };
}

// SCREEN 01 — Default
function ScreenDefault() {
  const { toast, show, close } = useToast();
  return (
    <ItineraryShell activeTab="faceid" toast={toast} onToastClose={close}>
      <FaceIdTabContent mode="default"
        onAction={(action) => { if (action === "openUpload") window.GO && window.GO(2); }}
        onToast={show}/>
    </ItineraryShell>
  );
}

// SCREEN 02 — Upload modal overlaid on Default
function ScreenUploadModal() {
  return (
    <ItineraryShell activeTab="faceid">
      <FaceIdTabContent mode="default"/>
      <UploadModal onClose={() => window.GO && window.GO(1)} onDone={() => window.GO && window.GO(3)}/>
    </ItineraryShell>
  );
}

// SCREEN 03 — Reviewing
function ScreenReviewing() {
  const { toast, show, close } = useToast();
  const statusBadge = <StatusPill tone="warn"><Icon name="warn" size={11}/> Reviewing batch</StatusPill>;
  const handle = (action) => {
    if (action === "confirm") { window.GO && window.GO(4); return; }
    if (action === "uploadMore") { window.GO && window.GO(2); return; }
  };
  return (
    <ItineraryShell activeTab="faceid" statusBadge={statusBadge} toast={toast} onToastClose={close}>
      <FaceIdTabContent mode="reviewing" batchVersion={1} onAction={handle} onToast={show}/>
    </ItineraryShell>
  );
}

// SCREEN 04 — Processing modal
function ScreenProcessing() {
  const data = window.PROTO_DATA;
  const queue = React.useMemo(() => {
    return data.guests
      .map(g => {
        const file = data.pickedFiles.find(f => f.match === g.profileId && f.status === "matched")
                  || data.pickedFiles.find(f => f.status === "ambiguous" && Array.isArray(f.match) && f.match.includes(g.profileId));
        if (!file) return null; // guest had no photo, skip
        const outcome = data.outcomes[g.profileId];
        if (!outcome) return null;
        return { ...g, file: file.file, result: outcome.status, bioId: outcome.bioId, error: outcome.error };
      })
      .filter(Boolean);
  }, []);
  const [idx, setIdx] = React.useState(0);
  const [statuses, setStatuses] = React.useState(() => queue.map(() => "pending"));
  const [done, setDone] = React.useState(false);

  React.useEffect(() => {
    if (done) return;
    if (idx >= queue.length) { setDone(true); return; }
    setStatuses(s => { const ns = [...s]; ns[idx] = "processing"; return ns; });
    const t = setTimeout(() => {
      setStatuses(s => { const ns = [...s]; ns[idx] = queue[idx].result; return ns; });
      setIdx(i => i + 1);
    }, 240 + Math.random() * 180);
    return () => clearTimeout(t);
  }, [idx, done]);

  const counts = {
    done: statuses.filter(s => s === "registered").length,
    failed: statuses.filter(s => s === "failed").length,
    processing: statuses.filter(s => s === "processing").length,
    pending: statuses.filter(s => s === "pending").length,
  };
  const completed = counts.done + counts.failed;
  const pct = queue.length === 0 ? 100 : Math.round(completed / queue.length * 100);
  const statusBadge = <StatusPill tone="brand"><Icon name="scan" size={11}/> Processing</StatusPill>;

  return (
    <ItineraryShell activeTab="faceid" statusBadge={statusBadge}>
      <div style={{ opacity: 0.35, pointerEvents: "none" }}>
        <FaceIdTabContent mode="reviewing"/>
      </div>
      <div style={{ position: "absolute", inset: 0, background: "rgba(17,32,46,0.42)", display: "grid", placeItems: "center", zIndex: 50 }}>
        <div style={{ width: 640, maxHeight: "82%", background: PMS.surface, border: `1px solid ${PMS.border}`, borderRadius: 8, boxShadow: "0 24px 60px rgba(17,32,46,0.18)", overflow: "hidden", display: "flex", flexDirection: "column" }}>
          <div style={{ padding: "14px 18px", borderBottom: `1px solid ${PMS.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontSize: 15, fontWeight: 700, color: PMS.ink }}>{done ? "Hoàn tất batch" : "Đang xử lý Face ID"}</div>
              <div style={{ fontSize: 12, color: PMS.inkMuted, marginTop: 2 }}>Bước 3/3 · {completed} / {queue.length} processed · concurrency = 5</div>
            </div>
            {!done && <Btn size="sm" variant="ghost" icon="x">Cancel</Btn>}
          </div>
          <div style={{ padding: "12px 18px", borderBottom: `1px solid ${PMS.border}` }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 12, color: PMS.inkMuted, marginBottom: 6 }}>
              <span>
                <span style={{ color: PMS.ok, fontWeight: 600 }}>{counts.done} registered</span> ·{" "}
                <span style={{ color: PMS.danger, fontWeight: 600 }}>{counts.failed} failed</span> ·{" "}
                <span>{counts.processing} in flight</span> ·{" "}
                <span style={{ color: PMS.inkSubtle }}>{counts.pending} queued</span>
              </span>
              <span>{pct}%</span>
            </div>
            <div style={{ height: 8, background: PMS.bg, borderRadius: 999, overflow: "hidden", display: "flex" }}>
              <div style={{ width: `${counts.done / queue.length * 100}%`, background: PMS.ok, transition: "width 0.3s" }}/>
              <div style={{ width: `${counts.failed / queue.length * 100}%`, background: PMS.danger, transition: "width 0.3s" }}/>
            </div>
          </div>
          <div style={{ overflow: "auto", flex: 1 }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
              <thead>
                <tr style={{ background: PMS.surfaceMuted, color: PMS.inkMuted, fontSize: 11, textTransform: "uppercase", letterSpacing: 0.4, position: "sticky", top: 0 }}>
                  {["#", "File → Guest", "Result"].map((h, i) =>
                    <th key={i} style={{ textAlign: "left", padding: "7px 12px", fontWeight: 500, borderBottom: `1px solid ${PMS.border}` }}>{h}</th>)}
                </tr>
              </thead>
              <tbody>
                {queue.map((q, i) => {
                  const st = statuses[i];
                  return (
                    <tr key={q.confNo} style={{ borderBottom: `1px solid ${PMS.border}`, opacity: st === "pending" ? 0.5 : 1 }}>
                      <td style={{ padding: "6px 12px", color: PMS.inkSubtle, fontFamily: "ui-monospace, Menlo, monospace", fontSize: 11 }}>{String(i + 1).padStart(2, "0")}</td>
                      <td style={{ padding: "6px 12px" }}>
                        <div style={{ fontWeight: 500, fontSize: 12 }}>{q.file}</div>
                        <div style={{ fontSize: 11, color: PMS.inkSubtle }}>→ {q.name} · {q.confNo}</div>
                      </td>
                      <td style={{ padding: "6px 12px", fontFamily: "ui-monospace, Menlo, monospace", fontSize: 11 }}>
                        {st === "pending" && <span style={{ color: PMS.inkSubtle }}>queued…</span>}
                        {st === "processing" && (
                          <span style={{ display: "inline-flex", alignItems: "center", gap: 6, color: PMS.brand, fontWeight: 600 }}>
                            <span style={{ width: 8, height: 8, borderRadius: "50%", background: PMS.brand, animation: "pulse 0.9s ease-in-out infinite" }}/>
                            calling API…
                          </span>
                        )}
                        {st === "registered" && <span style={{ color: PMS.ok }}>✓ {q.bioId}</span>}
                        {st === "failed" && <span style={{ color: PMS.danger }}>✗ {q.error}</span>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          {done && (
            <div style={{ padding: "10px 18px", background: PMS.surfaceMuted, borderTop: `1px solid ${PMS.border}`, display: "flex", justifyContent: "flex-end", gap: 6 }}>
              <Btn variant="primary" icon="arrowRight" onClick={() => window.GO && window.GO(5)}>Xem kết quả →</Btn>
            </div>
          )}
        </div>
      </div>
    </ItineraryShell>
  );
}

// SCREEN 05 — Resolved
function ScreenResolved() {
  const data = window.PROTO_DATA;
  const { toast, show, close } = useToast();
  const [bannerDismissed, setBannerDismissed] = React.useState(false);
  const outcomes = Object.values(data.outcomes);
  const okCount = outcomes.filter(o => o.status === "registered").length;
  const failCount = outcomes.filter(o => o.status === "failed").length;
  const failedNames = data.guests
    .filter(g => data.outcomes[g.profileId] && data.outcomes[g.profileId].status === "failed")
    .map(g => `${g.name} (${data.outcomes[g.profileId].error})`)
    .join(", ");
  const statusBadge = <StatusPill tone="accent"><Icon name="face" size={11}/> {okCount}/{data.guests.length} sẵn sàng</StatusPill>;

  return (
    <ItineraryShell activeTab="faceid" statusBadge={statusBadge} toast={toast} onToastClose={close}>
      {!bannerDismissed && (
        <div style={{ background: failCount > 0 ? PMS.warnSoft : PMS.okSoft, border: `1px solid ${failCount > 0 ? "#EBC79A" : "#BFE0CF"}`, borderRadius: 6, padding: "12px 14px", display: "flex", gap: 10, alignItems: "flex-start", marginBottom: 12 }}>
          <div style={{ color: failCount > 0 ? PMS.warn : PMS.ok, marginTop: 1 }}><Icon name={failCount > 0 ? "warn" : "check"} size={18}/></div>
          <div style={{ flex: 1, fontSize: 12, color: PMS.ink, lineHeight: 1.55 }}>
            <strong>Batch complete · {okCount} registered · {failCount} failed · 28/12/2025 09:42</strong>
            {failCount > 0 && <div style={{ marginTop: 4, color: PMS.inkMuted }}>{failCount} failed: {failedNames}</div>}
            {failCount > 0 && (
              <div style={{ marginTop: 8 }}>
                <Btn size="sm" variant="primary" icon="refresh" onClick={() => show(`Re-running ${failCount} failed guests…`, "brand")}>Re-run failed</Btn>
              </div>
            )}
          </div>
          <Btn size="sm" variant="ghost" icon="x" onClick={() => setBannerDismissed(true)}>Dismiss</Btn>
        </div>
      )}
      <FaceIdTabContent mode="resolved"
        onAction={(action) => { if (action === "openUpload") window.GO && window.GO(2); }}
        onToast={show}/>
    </ItineraryShell>
  );
}

window.ScreenDefault = ScreenDefault;
window.ScreenUploadModal = ScreenUploadModal;
window.ScreenReviewing = ScreenReviewing;
window.ScreenProcessing = ScreenProcessing;
window.ScreenResolved = ScreenResolved;
</script>

</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useLayoutEffect } = React;

const SCREENS = [
  { id: "s1", label: "01 · Default",          Component: ScreenDefault,    width: 1440, height: 900 },
  { id: "s2", label: "02 · Upload modal",     Component: ScreenUploadModal, width: 1440, height: 900 },
  { id: "s3", label: "03 · Reviewing",        Component: ScreenReviewing,  width: 1440, height: 1100 },
  { id: "s4", label: "04 · Processing modal", Component: ScreenProcessing, width: 1440, height: 1000 },
  { id: "s5", label: "05 · Resolved",         Component: ScreenResolved,   width: 1440, height: 1000 },
];

function App() {
  const [step, setStep] = useState(1);
  const frameRef = useRef(null);
  const [scale, setScale] = useState(1);

  useEffect(() => { window.GO = (n) => { if (typeof n === "number" && n >= 1 && n <= SCREENS.length) setStep(n); }; }, []);

  const current = SCREENS[step - 1];

  useLayoutEffect(() => {
    const compute = () => {
      const frame = frameRef.current; if (!frame) return;
      const rect = frame.getBoundingClientRect();
      const padding = 32;
      const sx = (rect.width  - padding) / current.width;
      const sy = (rect.height - padding) / current.height;
      const next = Math.min(sx, sy, 1);
      setScale(next > 0 ? next : 1);
    };
    compute();
    window.addEventListener("resize", compute);
    return () => window.removeEventListener("resize", compute);
  }, [step]);

  useEffect(() => {
    const onKey = (e) => {
      if (e.target && (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.isContentEditable)) return;
      if (e.key === "ArrowRight") setStep((s) => Math.min(SCREENS.length, s + 1));
      if (e.key === "ArrowLeft")  setStep((s) => Math.max(1, s - 1));
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  return (
    <>
      <div className="nav-bar">
        <span className="title">v2.2 · Face ID Registration · 2-status columns + transitions</span>
        {SCREENS.map((s, i) => (
          <span key={s.id} className={"step" + (i + 1 === step ? " active" : "")} onClick={() => setStep(i + 1)}>{s.label}</span>
        ))}
        <span className="hint">← → để chuyển màn hình</span>
        <button className="icon" onClick={() => setStep((s) => Math.max(1, s - 1))} disabled={step === 1}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18 9 12l6-6"/></svg>
        </button>
        <button className="icon" onClick={() => setStep((s) => Math.min(SCREENS.length, s + 1))} disabled={step === SCREENS.length}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </div>
      <div className="app-frame" ref={frameRef}>
        <div className="stage" style={{ width: current.width, height: current.height, transform: `scale(${scale})` }} key={current.id}>
          <current.Component/>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
